<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>后台管理 - 添加/删除授权手机号</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f0f7ff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            background: white;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        h1 { font-size: 1.6rem; margin-bottom: 20px; color: #1e3c72; }
        .input-group { margin-bottom: 20px; }
        label { font-weight: 500; display: block; margin-bottom: 6px; }
        input, button {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border-radius: 60px;
            border: 1px solid #ccc;
        }
        button {
            background: #2c7da0;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            margin-top: 8px;
        }
        button:hover { background: #1f5e7a; }
        .error { color: #d9534f; margin-top: 8px; }
        .success { color: #28a745; margin-top: 8px; }
        .phone-list {
            background: #f8f9fa;
            border-radius: 24px;
            padding: 16px;
            margin-top: 20px;
        }
        .phone-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        .phone-number { font-family: monospace; font-size: 1rem; }
        .del-btn {
            background: #dc3545;
            border: none;
            border-radius: 40px;
            padding: 4px 12px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
            width: auto;
            margin: 0;
        }
        .del-btn:hover { background: #c82333; }
        .refresh-btn {
            background: #5f7f9e;
            margin-top: 0;
        }
        hr { margin: 20px 0; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔐 管理授权手机号</h1>
    <div class="input-group">
        <label>🔑 GitHub 令牌 (Personal Access Token)</label>
        <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
        <button id="saveTokenBtn">保存令牌</button>
        <div id="tokenMsg" class="error"></div>
    </div>

    <div id="mainPanel" style="display: none;">
        <div class="input-group">
            <label>📱 添加新手机号</label>
            <input type="tel" id="newPhone" placeholder="例如 13812345678">
            <button id="addBtn">➕ 添加</button>
            <div id="addMsg" class="success"></div>
        </div>

        <hr>
        <div style="display: flex; justify-content: space-between; align-items: baseline;">
            <h3>📋 当前授权列表</h3>
            <button id="refreshBtn" class="refresh-btn">🔄 刷新</button>
        </div>
        <div id="phoneList" class="phone-list">加载中...</div>
    </div>
</div>

<script>
    const REPO_OWNER = 'secondary-vocab';
    const REPO_NAME = 'word-game';
    const FILE_PATH = 'index.html';
    const BRANCH = 'main';

    let githubToken = localStorage.getItem('github_token');

    if (githubToken) {
        document.getElementById('mainPanel').style.display = 'block';
        document.getElementById('tokenMsg').innerHTML = '✅ 令牌已保存';
        document.getElementById('tokenInput').value = '';
        refreshList();
    }

    document.getElementById('saveTokenBtn').onclick = () => {
        const token = document.getElementById('tokenInput').value.trim();
        if (token && token.startsWith('ghp_')) {
            localStorage.setItem('github_token', token);
            githubToken = token;
            document.getElementById('mainPanel').style.display = 'block';
            document.getElementById('tokenMsg').innerHTML = '✅ 令牌保存成功！';
            document.getElementById('tokenInput').value = '';
            refreshList();
        } else {
            document.getElementById('tokenMsg').innerHTML = '❌ 无效令牌，必须以 ghp_ 开头';
        }
    };

    async function fetchFileContent() {
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
        const res = await fetch(url, { headers: { 'Authorization': `token ${githubToken}` } });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const content = atob(data.content.replace(/\n/g, ''));
        return { content, sha: data.sha };
    }

    async function updateFile(newContent, sha, commitMsg) {
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
        const res = await fetch(url, {
            method: 'PUT',
            headers: { 'Authorization': `token ${githubToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: commitMsg, content: btoa(unescape(encodeURIComponent(newContent))), sha, branch: BRANCH })
        });
        if (!res.ok) throw new Error(`更新失败: ${res.status}`);
        return await res.json();
    }

    async function getPhoneList() {
        const { content } = await fetchFileContent();
        const regex = /const ALLOWED_PHONES = \[([\s\S]*?)\];/;
        const match = content.match(regex);
        if (!match) throw new Error('未找到 ALLOWED_PHONES 数组');
        const phonesStr = match[1];
        const phoneRegex = /'(\d+)'/g;
        let phones = [], m;
        while ((m = phoneRegex.exec(phonesStr)) !== null) phones.push(m[1]);
        return { phones, content };
    }

    async function updatePhoneList(newPhones) {
        const { content, sha } = await fetchFileContent();
        const newLine = `const ALLOWED_PHONES = [${newPhones.map(p => `'${p}'`).join(', ')}];`;
        const newContent = content.replace(/const ALLOWED_PHONES = \[[\s\S]*?\];/, newLine);
        await updateFile(newContent, sha, `更新白名单: ${newPhones.length}个号码`);
    }

    async function refreshList() {
        const listDiv = document.getElementById('phoneList');
        listDiv.innerHTML = '加载中...';
        try {
            const { phones } = await getPhoneList();
            if (phones.length === 0) {
                listDiv.innerHTML = '<div style="color:gray;">暂无授权手机号</div>';
                return;
            }
            let html = '';
            phones.forEach(phone => {
                html += `
                    <div class="phone-item">
                        <span class="phone-number">${phone}</span>
                        <button class="del-btn" data-phone="${phone}">删除</button>
                    </div>
                `;
            });
            listDiv.innerHTML = html;
            document.querySelectorAll('.del-btn').forEach(btn => {
                btn.onclick = async (e) => {
                    e.stopPropagation();
                    const phoneToDel = btn.getAttribute('data-phone');
                    if (confirm(`确定要删除手机号 ${phoneToDel} 吗？`)) {
                        try {
                            const { phones: currentPhones } = await getPhoneList();
                            const newPhones = currentPhones.filter(p => p !== phoneToDel);
                            await updatePhoneList(newPhones);
                            document.getElementById('addMsg').innerHTML = `✅ 已删除 ${phoneToDel}`;
                            refreshList();
                        } catch (err) {
                            document.getElementById('addMsg').innerHTML = `❌ 删除失败: ${err.message}`;
                        }
                    }
                };
            });
        } catch (err) {
            listDiv.innerHTML = `<div class="error">加载失败: ${err.message}</div>`;
        }
    }

    document.getElementById('addBtn').onclick = async () => {
        const phone = document.getElementById('newPhone').value.trim();
        if (!phone) { document.getElementById('addMsg').innerHTML = '❌ 请输入手机号'; return; }
        if (!/^1[3-9]\d{9}$/.test(phone)) { document.getElementById('addMsg').innerHTML = '❌ 手机号格式错误'; return; }
        try {
            const { phones } = await getPhoneList();
            if (phones.includes(phone)) { document.getElementById('addMsg').innerHTML = '⚠️ 手机号已存在'; return; }
            phones.push(phone);
            await updatePhoneList(phones);
            document.getElementById('addMsg').innerHTML = `✅ 成功添加 ${phone}`;
            document.getElementById('newPhone').value = '';
            refreshList();
        } catch (err) {
            document.getElementById('addMsg').innerHTML = `❌ 添加失败: ${err.message}`;
        }
    };

    document.getElementById('refreshBtn').onclick = () => refreshList();
</script>
</body>
</html>
