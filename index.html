            { word: "top", meaning: "顶部" }, { word: "total", meaning: "总计" },
            { word: "touch", meaning: "触摸" }, { word: "tour", meaning: "旅游" },
            { word: "tourist", meaning: "游客" }, { word: "toward", meaning: "朝向" },
            { word: "town", meaning: "城镇" }, { word: "track", meaning: "轨道" },
            { word: "trade", meaning: "贸易" }, { word: "traditional", meaning: "传统的" },
            { word: "traffic", meaning: "交通" }, { word: "train", meaning: "火车" },
            { word: "treat", meaning: "对待；治疗" }, { word: "tree", meaning: "树" },
            { word: "trip", meaning: "旅行" }, { word: "trouble", meaning: "麻烦" },
            { word: "true", meaning: "真实的" }, { word: "trust", meaning: "信任" },
            { word: "truth", meaning: "真相" }, { word: "twice", meaning: "两次" },
            { word: "type", meaning: "类型" }, { word: "ugly", meaning: "丑陋的" },
            { word: "uncle", meaning: "叔叔" }, { word: "under", meaning: "在...下面" },
            { word: "understand", meaning: "理解" }, { word: "unit", meaning: "单元" },
            { word: "unite", meaning: "联合" }, { word: "university", meaning: "大学" },
            { word: "unknown", meaning: "未知的" }, { word: "unless", meaning: "除非" },
            { word: "until", meaning: "直到" }, { word: "unusual", meaning: "不寻常的" },
            { word: "up", meaning: "向上" }, { word: "upon", meaning: "在...之上" },
            { word: "us", meaning: "我们" }, { word: "use", meaning: "使用" },
            { word: "usual", meaning: "通常的" }, { word: "vacation", meaning: "假期" },
            { word: "valuable", meaning: "有价值的" }, { word: "value", meaning: "价值" },
            { word: "vegetable", meaning: "蔬菜" }, { word: "very", meaning: "非常" },
            { word: "victory", meaning: "胜利" }, { word: "video", meaning: "视频" },
            { word: "view", meaning: "观点" }, { word: "village", meaning: "村庄" },
            { word: "visit", meaning: "访问" }, { word: "voice", meaning: "声音" },
            { word: "wait", meaning: "等待" }, { word: "walk", meaning: "散步" },
            { word: "wall", meaning: "墙" }, { word: "want", meaning: "想要" },
            { word: "war", meaning: "战争" }, { word: "warm", meaning: "温暖的" },
            { word: "warn", meaning: "警告" }, { word: "wash", meaning: "洗" },
            { word: "waste", meaning: "浪费" }, { word: "watch", meaning: "观看" },
            { word: "water", meaning: "水" }, { word: "way", meaning: "方法" },
            { word: "we", meaning: "我们" }, { word: "weak", meaning: "虚弱的" },
            { word: "wealth", meaning: "财富" }, { word: "wear", meaning: "穿" },
            { word: "weather", meaning: "天气" }, { word: "week", meaning: "周" },
            { word: "weekend", meaning: "周末" }, { word: "weight", meaning: "重量" }
        ];        let currentBank = "waichong";
        let originalWords = [...WAICHONG_WORDS];
        let wrongList = [];
        let currentMode = "normal";
        let currentQuestion = null;
        let currentOptions = [];
        let answered = false;
        let currentScore = 0;
        let answeredCount = 0;

        const loginContainer = document.getElementById('loginContainer');
        const gameContainer = document.getElementById('gameContent');
        const phoneInput = document.getElementById('phoneNumber');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        const pauseBtn = document.getElementById('pauseBtn');
        const speakBtn = document.getElementById('speakBtn');
        const directionBtn = document.getElementById('directionBtn');

        phoneInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });
        loginBtn.onclick = () => {
            let phone = phoneInput.value.trim();
            if (!phone) loginError.innerText = '请输入手机号';
            else if (!ALLOWED_PHONES.includes(phone)) loginError.innerText = '该手机号未获得授权，请联系客服购买。';
            else {
                currentPhone = phone;
                loginContainer.classList.add('hidden');
                gameContainer.classList.remove('hidden');
                initGame();
            }
        };

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function startTimer() {
            stopTimer();
            if (isPaused) return;
            timeLeft = TIME_LIMIT;
            document.getElementById('timerDisplay').innerText = timeLeft;
            timerInterval = setInterval(() => {
                if (!answered && currentQuestion && !isPaused) {
                    timeLeft--;
                    document.getElementById('timerDisplay').innerText = timeLeft;
                    if (timeLeft <= 0) {
                        stopTimer();
                        if (!answered && currentQuestion) {
                            answered = true;
                            answeredCount++;
                            levelQuestionsCount++;
                            document.getElementById('feedbackMsg').innerHTML = `⏰ 超时！正确答案是 ${currentQuestion.word}`;
                            if (!wrongList.some(w => w.word === currentQuestion.word)) {
                                wrongList.push({ word: currentQuestion.word, meaning: currentQuestion.meaning });
                                saveWrong();
                                renderWrongList();
                            }
                            updateScoreUI();
                            updateLevelDisplay();
                            disableOptions();
                            if (currentMode !== "wrongPractice") {
                                generateNewQuestion();
                            }
                        }
                    }
                }
            }, 1000);
        }

        function togglePause() {
            if (!currentQuestion) return;
            if (isPaused) {
                isPaused = false;
                startTimer();
                pauseBtn.innerHTML = '⏸️ 暂停';
                pauseBtn.style.background = '#5f7f9e';
            } else {
                isPaused = true;
                stopTimer();
                pauseBtn.innerHTML = '▶️ 继续';
                pauseBtn.style.background = '#2c7da0';
            }
        }

        function toggleDirection() {
            quizDirection = (quizDirection === 'ch2en') ? 'en2ch' : 'ch2en';
            directionBtn.innerText = quizDirection === 'ch2en' ? '🔄 中→英' : '🔄 英→中';
            generateNewQuestion();
        }

        function disableOptions() {
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.disabled = true;
            });
        }
        function enableOptions() {
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.disabled = false;
            });
        }

        function updateLevelDisplay() {
            document.getElementById('currentLevel').innerText = currentLevel;
            document.getElementById('levelProgress').innerText = levelQuestionsCount;
        }

        function speakWord(word) {
            if ('speechSynthesis' in window) {
                let utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            } else {
                alert("您的浏览器不支持语音朗读功能。");
            }
        }

        async function fetchPhonetic(word) {
            try {
                const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                if (response.ok) {
                    const data = await response.json();
                    if (data && data[0] && data[0].phonetic) {
                        return data[0].phonetic;
                    }
                }
                return '';
            } catch (error) {
                return '';
            }
        }
        function updatePhoneticDisplay(phonetic) {
            const phoneticDiv = document.getElementById('phoneticDisplay');
            if (phonetic) {
                phoneticDiv.innerText = `/${phonetic}/`;
            } else {
                phoneticDiv.innerText = '';
            }
        }

        function initGame() {
            const storageKey = `wrongList_${currentPhone}`;
            const stored = localStorage.getItem(storageKey);
            wrongList = stored ? JSON.parse(stored) : [];
            renderWrongList();
            currentLevel = 1;
            levelQuestionsCount = 0;
            levelCorrectCount = 0;
            currentScore = 0;
            answeredCount = 0;
            updateScoreUI();
            updateLevelDisplay();
            generateNewQuestion();
            document.getElementById('nextBtn').onclick = () => nextQuestion();
            document.getElementById('restartBtn').onclick = () => restartGame();
            document.getElementById('practiceAllBtn').onclick = () => practiceAllWrong();
            document.getElementById('clearWrongBtn').onclick = () => clearWrong();
            document.querySelectorAll('.bank-btn').forEach(btn => {
                btn.onclick = () => switchBank(btn.getAttribute('data-bank'));
            });
            if (pauseBtn) pauseBtn.onclick = togglePause;
            if (speakBtn) speakBtn.onclick = () => { if (currentQuestion) speakWord(currentQuestion.word); };
            if (directionBtn) directionBtn.onclick = toggleDirection;
        }

        function saveWrong() {
            localStorage.setItem(`wrongList_${currentPhone}`, JSON.stringify(wrongList));
        }

        function updateScoreUI() {
            document.getElementById('score').innerText = currentScore;
            const acc = answeredCount === 0 ? 0 : Math.round((currentScore / answeredCount) * 100);
            document.getElementById('accuracy').innerText = acc;
        }

        function generateOptions(correctWord, correctMeaning) {
            let candidates = originalWords.filter(w => w.word !== correctWord);
            for (let i = candidates.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
            }
            let wrongWords = candidates.slice(0, 3).map(w => w.word);
            
            if (quizDirection === 'ch2en') {
                let options = [correctWord, ...wrongWords];
                for (let i = options.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [options[i], options[j]] = [options[j], options[i]];
                }
                return options.map(opt => ({ display: opt, value: opt }));
            } else {
                let wrongMeanings = wrongWords.map(w => originalWords.find(item => item.word === w).meaning);
                let options = [correctMeaning, ...wrongMeanings];
                for (let i = options.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [options[i], options[j]] = [options[j], options[i]];
                }
                return options.map(opt => ({ display: opt, value: opt }));
            }
        }

        function getCurrentWordPool() {
            if (currentMode === "wrongPractice" && wrongList.length > 0) {
                return wrongList.map(w => ({ word: w.word, meaning: w.meaning }));
            }
            return originalWords;
        }

        function generateNewQuestion() {
            if (isPaused) {
                isPaused = false;
                pauseBtn.innerHTML = '⏸️ 暂停';
                pauseBtn.style.background = '#5f7f9e';
            }
            stopTimer();
            enableOptions();
            const pool = getCurrentWordPool();
            if (pool.length === 0) {
                document.getElementById('chineseWord').innerText = "🎉 恭喜！没有可练习的单词了！";
                document.getElementById('optionsContainer').innerHTML = "";
                document.getElementById('feedbackMsg').innerText = "点击「重新开始」继续随机练习";
                currentQuestion = null;
                return;
            }
            const randomIndex = Math.floor(Math.random() * pool.length);
            const selected = pool[randomIndex];
            currentQuestion = { word: selected.word, meaning: selected.meaning };
            
            if (quizDirection === 'ch2en') {
                document.getElementById('chineseWord').innerText = currentQuestion.meaning;
            } else {
                document.getElementById('chineseWord').innerText = currentQuestion.word;
            }
            currentOptions = generateOptions(currentQuestion.word, currentQuestion.meaning);
            renderOptions();
            document.getElementById('feedbackMsg').innerText = "";
            answered = false;
            startTimer();
            fetchPhonetic(currentQuestion.word).then(phonetic => updatePhoneticDisplay(phonetic));
        }

        function renderOptions() {
            const container = document.getElementById('optionsContainer');
            container.innerHTML = "";
            currentOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.display;
                btn.onclick = () => handleAnswer(opt.value);
                container.appendChild(btn);
            });
        }

        function handleAnswer(selectedValue) {
            if (answered || !currentQuestion) return;
            stopTimer();
            let isCorrect;
            if (quizDirection === 'ch2en') {
                isCorrect = (selectedValue === currentQuestion.word);
            } else {
                isCorrect = (selectedValue === currentQuestion.meaning);
            }
            answered = true;
            answeredCount++;
            levelQuestionsCount++;
            
            if (isCorrect) {
                currentScore++;
                levelCorrectCount++;
                document.getElementById('feedbackMsg').innerText = "✅ 正确！";
                if (currentMode === "wrongPractice") {
                    const idx = wrongList.findIndex(w => w.word === currentQuestion.word);
                    if (idx !== -1) {
                        wrongList.splice(idx, 1);
                        saveWrong();
                        renderWrongList();
                    }
                    if (wrongList.length === 0) {
                        currentMode = "normal";
                        document.getElementById('modeInfo').innerText = "🎲 随机模式";
                    }
                }
                updateScoreUI();
                updateLevelDisplay();
            } else {
                document.getElementById('feedbackMsg').innerHTML = `❌ 错误！正确答案是 ${currentQuestion.word}`;
                if (!wrongList.some(w => w.word === currentQuestion.word)) {
                    wrongList.push({ word: currentQuestion.word, meaning: currentQuestion.meaning });
                    saveWrong();
                    renderWrongList();
                }
                updateScoreUI();
                updateLevelDisplay();
            }
            
            if (levelQuestionsCount >= LEVEL_SIZE) {
                const passRate = levelCorrectCount / LEVEL_SIZE;
                if (passRate >= LEVEL_PASS_RATE) {
                    currentLevel++;
                    levelQuestionsCount = 0;
                    levelCorrectCount = 0;
                    updateLevelDisplay();
                    alert(`🎉 恭喜通过第 ${currentLevel-1} 关！进入第 ${currentLevel} 关`);
                } else {
                    levelQuestionsCount = 0;
                    levelCorrectCount = 0;
                    updateLevelDisplay();
                    alert(`❌ 第 ${currentLevel} 关未通过（正确率${Math.round(passRate*100)}% < 80%），请去错题本练习后重新挑战本关`);
                }
            }
            
            if (currentMode !== "wrongPractice") {
                generateNewQuestion();
            } else {
                disableOptions();
            }
        }

        function renderWrongList() {
            const container = document.getElementById('wrongList');
            if (wrongList.length === 0) {
                container.innerHTML = "<div style='color:gray;'>暂无错题，答错后自动出现</div>";
                return;
            }
            container.innerHTML = "";
            wrongList.forEach(item => {
                const div = document.createElement('div');
                div.className = 'wrong-item';
                div.innerHTML = `<div><strong>${item.word}</strong> ${item.meaning}</div><button class="retry-single" data-word="${item.word}">重做</button>`;
                container.appendChild(div);
            });
            document.querySelectorAll('.retry-single').forEach(btn => {
                btn.onclick = (e) => {
                    const word = btn.getAttribute('data-word');
                    const wrongItem = wrongList.find(w => w.word === word);
                    if (wrongItem) {
                        stopTimer();
                        currentMode = "wrongPractice";
                        document.getElementById('modeInfo').innerText = "⚠️ 错题练习模式（单个重做）";
                        currentQuestion = { word: wrongItem.word, meaning: wrongItem.meaning };
                        if (quizDirection === 'ch2en') {
                            document.getElementById('chineseWord').innerText = currentQuestion.meaning;
                        } else {
                            document.getElementById('chineseWord').innerText = currentQuestion.word;
                        }
                        currentOptions = generateOptions(wrongItem.word, wrongItem.meaning);
                        renderOptions();
                        document.getElementById('feedbackMsg').innerText = "";
                        answered = false;
                        startTimer();
                        fetchPhonetic(currentQuestion.word).then(phonetic => updatePhoneticDisplay(phonetic));
                    }
                };
            });
        }

        function nextQuestion() {
            if (currentMode === "wrongPractice") {
                if (!answered && currentQuestion) {
                    document.getElementById('feedbackMsg').innerText = "请先答对当前错题！";
                    return;
                }
                generateNewQuestion();
            } else {
                if (!answered && currentQuestion) {
                    document.getElementById('feedbackMsg').innerText = "请先回答当前题目！";
                    return;
                }
                generateNewQuestion();
            }
        }

        function restartGame() {
            stopTimer();
            currentScore = 0;
            answeredCount = 0;
            currentMode = "normal";
            currentLevel = 1;
            levelQuestionsCount = 0;
            levelCorrectCount = 0;
            document.getElementById('modeInfo').innerText = "🎲 随机模式";
            wrongList = [];
            saveWrong();
            renderWrongList();
            updateScoreUI();
            updateLevelDisplay();
            generateNewQuestion();
        }

        function clearWrong() {
            wrongList = [];
            saveWrong();
            renderWrongList();
            if (currentMode === "wrongPractice") {
                currentMode = "normal";
                document.getElementById('modeInfo').innerText = "🎲 随机模式";
                generateNewQuestion();
            }
        }

        function practiceAllWrong() {
            if (wrongList.length === 0) {
                alert("错题本为空，请先答错一些题目");
                return;
            }
            stopTimer();
            currentMode = "wrongPractice";
            document.getElementById('modeInfo').innerText = "⚠️ 错题练习模式（全部错题）";
            generateNewQuestion();
        }

        function switchBank(bank) {
            if (bank === currentBank) return;
            stopTimer();
            currentBank = bank;
            originalWords = bank === "waichong" ? [...WAICHONG_WORDS] : [...JUNIOR_WORDS];
            currentScore = 0;
            answeredCount = 0;
            currentMode = "normal";
            currentLevel = 1;
            levelQuestionsCount = 0;
            levelCorrectCount = 0;
            document.getElementById('modeInfo').innerText = "🎲 随机模式";
            updateScoreUI();
            updateLevelDisplay();
            generateNewQuestion();
            document.querySelectorAll('.bank-btn').forEach(btn => {
                if (btn.getAttribute('data-bank') === bank) {
                    btn.classList.add('bank-active');
                } else {
                    btn.classList.remove('bank-active');
                }
            });
        }
    </script>
</body>
</html>
