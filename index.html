<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中学词汇闯关</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui; background: #f0f7ff; padding: 20px; }
        .login-box, .game-box { max-width: 500px; margin: 80px auto; background: white; border-radius: 32px; padding: 30px; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 60px; border: 1px solid #ccc; }
        button { background: #2c7da0; color: white; font-weight: bold; cursor: pointer; }
        .error { color: red; margin-top: 12px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="loginBox" class="login-box">
        <h2>📱 手机号登录</h2>
        <input type="tel" id="phone" placeholder="手机号">
        <button id="loginBtn">登录</button>
        <div id="errorMsg" class="error"></div>
    </div>
    <div id="gameBox" class="game-box hidden">
        <h2>🎉 登录成功！</h2>
        <p>欢迎使用中学词汇闯关</p>
        <button id="logoutBtn">退出登录</button>
    </div>

    <script>
        // 授权手机号列表（添加你允许的手机号）
        const ALLOWED_PHONES = ['13971005659'];

        const loginBox = document.getElementById('loginBox');
        const gameBox = document.getElementById('gameBox');
        const phoneInput = document.getElementById('phone');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const logoutBtn = document.getElementById('logoutBtn');

        // 检查是否已登录
        if (localStorage.getItem('loggedPhone')) {
            loginBox.classList.add('hidden');
            gameBox.classList.remove('hidden');
        }

        loginBtn.onclick = () => {
            const phone = phoneInput.value.trim();
            if (!phone) {
                errorMsg.innerText = '请输入手机号';
                return;
            }
            if (ALLOWED_PHONES.includes(phone)) {
                localStorage.setItem('loggedPhone', phone);
                loginBox.classList.add('hidden');
                gameBox.classList.remove('hidden');
            } else {
                errorMsg.innerText = '该手机号未授权，请联系客服购买';
            }
        };

        logoutBtn.onclick = () => {
            localStorage.removeItem('loggedPhone');
            loginBox.classList.remove('hidden');
            gameBox.classList.add('hidden');
            phoneInput.value = '';
            errorMsg.innerText = '';
        };
    </script>
</body>
</html>
