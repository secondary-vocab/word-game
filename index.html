            { word: "copy", meaning: "氓陇聧氓聢露" }, { word: "corner", meaning: "猫搂聮猫聬陆" }, { word: "correct", meaning: "忙颅拢莽隆庐莽職聞" }, { word: "cost", meaning: "猫聤卤猫麓鹿" }, { word: "could", meaning: "氓聫炉盲禄楼" },
            { word: "council", meaning: "氓搂聰氓聭聵盲录職" }, { word: "count", meaning: "忙聲掳忙聲掳" }, { word: "country", meaning: "氓聸陆氓庐露" }, { word: "county", meaning: "氓聨驴" }, { word: "couple", meaning: "盲赂聙氓炉鹿" },
            { word: "courage", meaning: "氓聥聡忙掳聰" }, { word: "course", meaning: "猫炉戮莽篓聥" }, { word: "court", meaning: "忙鲁聲氓潞颅" }, { word: "cover", meaning: "猫娄聠莽聸聳" }, { word: "crash", meaning: "莽垄掳忙聮聻" },
            { word: "crazy", meaning: "莽聳炉莽聥聜莽職聞" }, { word: "cream", meaning: "氓楼露忙虏鹿" }, { word: "create", meaning: "氓聢聸茅聙聽" }, { word: "credit", meaning: "盲驴隆莽聰篓" }, { word: "crime", meaning: "莽聤炉莽陆陋" },
            { word: "crisis", meaning: "氓聧卤忙聹潞" }, { word: "critical", meaning: "氓聟鲁茅聰庐莽職聞" }, { word: "cross", meaning: "莽漏驴猫驴聡" }, { word: "crowd", meaning: "盲潞潞莽戮陇" }, { word: "crucial", meaning: "猫聡鲁氓聟鲁茅聡聧猫娄聛莽職聞" },
            { word: "cry", meaning: "氓聯颅" }, { word: "cultural", meaning: "忙聳聡氓聦聳莽職聞" }, { word: "culture", meaning: "忙聳聡氓聦聳" }, { word: "cup", meaning: "忙聺炉氓颅聬" }, { word: "current", meaning: "氓陆聯氓聣聧莽職聞" },
            { word: "curtain", meaning: "莽陋聴氓赂聵" }, { word: "curve", meaning: "忙聸虏莽潞驴" }, { word: "customer", meaning: "茅隆戮氓庐垄" }, { word: "cut", meaning: "氓聢聡氓聣虏" }, { word: "cycle", meaning: "氓戮陋莽聨炉" },
            { word: "dad", meaning: "莽聢赂莽聢赂" }, { word: "daily", meaning: "忙炉聫忙聴楼莽職聞" }, { word: "damage", meaning: "忙聧聼氓聺聫" }, { word: "dance", meaning: "猫路鲁猫聢聻" }, { word: "danger", meaning: "氓聧卤茅聶漏" },
            { word: "dangerous", meaning: "氓聧卤茅聶漏莽職聞" }, { word: "dark", meaning: "茅禄聭忙職聴莽職聞" }, { word: "data", meaning: "忙聲掳忙聧庐" }, { word: "date", meaning: "忙聴楼忙聹聼" }, { word: "daughter", meaning: "氓楼鲁氓聞驴" },
            { word: "day", meaning: "氓陇漏" }, { word: "dead", meaning: "忙颅禄莽職聞" }, { word: "deal", meaning: "氓陇聞莽聬聠" }, { word: "dear", meaning: "盲潞虏莽聢卤莽職聞" }, { word: "death", meaning: "忙颅禄盲潞隆" },
            { word: "debate", meaning: "猫戮漏猫庐潞" }, { word: "debt", meaning: "氓聙潞氓聤隆" }, { word: "decade", meaning: "氓聧聛氓鹿麓" }, { word: "decide", meaning: "氓聠鲁氓庐職" }, { word: "decision", meaning: "氓聠鲁氓庐職" }
        ];        let currentBank = "waichong";
        let originalWords = [...WAICHONG_WORDS];
        let wrongList = [];
        let currentMode = "normal";
        let currentQuestion = null;
        let currentOptions = [];
        let answered = false;
        let currentScore = 0;
        let answeredCount = 0;

        const loginContainer = document.getElementById('loginContainer');
        const gameContainer = document.getElementById('gameContent');
        const phoneInput = document.getElementById('phoneNumber');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        const pauseBtn = document.getElementById('pauseBtn');
        const speakBtn = document.getElementById('speakBtn');
        const directionBtn = document.getElementById('directionBtn');

        phoneInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') loginBtn.click(); });
        loginBtn.onclick = () => {
            let phone = phoneInput.value.trim();
            if (!phone) loginError.innerText = '猫炉路猫戮聯氓聟楼忙聣聥忙聹潞氓聫路';
            else if (!ALLOWED_PHONES.includes(phone)) loginError.innerText = '猫炉楼忙聣聥忙聹潞氓聫路忙聹陋猫聨路氓戮聴忙聨聢忙聺聝茂录聦猫炉路猫聛聰莽鲁禄氓庐垄忙聹聧猫麓颅盲鹿掳茫聙聜';
            else { currentPhone = phone; loginContainer.classList.add('hidden'); gameContainer.classList.remove('hidden'); initGame(); }
        };

        function stopTimer() {
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        }
        function startTimer() {
            stopTimer();
            if (isPaused) return;
            timeLeft = TIME_LIMIT;
            document.getElementById('timerDisplay').innerText = timeLeft;
            timerInterval = setInterval(() => {
                if (!answered && currentQuestion && !isPaused) {
                    timeLeft--;
                    document.getElementById('timerDisplay').innerText = timeLeft;
                    if (timeLeft <= 0) {
                        stopTimer();
                        if (!answered && currentQuestion) {
                            answered = true;
                            answeredCount++;
                            levelQuestionsCount++;
                            document.getElementById('feedbackMsg').innerHTML = `芒聫掳 猫露聟忙聴露茂录聛忙颅拢莽隆庐莽颅聰忙隆聢忙聵炉 ${currentQuestion.word}`;
                            if (!wrongList.some(w => w.word === currentQuestion.word)) {
                                wrongList.push({ word: currentQuestion.word, meaning: currentQuestion.meaning });
                                saveWrong(); renderWrongList();
                            }
                            updateScoreUI(); updateLevelDisplay(); disableOptions();
                            if (currentMode !== "wrongPractice") generateNewQuestion();
                        }
                    }
                }
            }, 1000);
        }

        function togglePause() {
            if (!currentQuestion) return;
            if (isPaused) {
                isPaused = false; startTimer();
                pauseBtn.innerHTML = '芒聫赂茂赂聫 忙職聜氓聛聹'; pauseBtn.style.background = '#5f7f9e';
            } else {
                isPaused = true; stopTimer();
                pauseBtn.innerHTML = '芒聳露茂赂聫 莽禄搂莽禄颅'; pauseBtn.style.background = '#2c7da0';
            }
        }

        function toggleDirection() {
            quizDirection = quizDirection === 'ch2en' ? 'en2ch' : 'ch2en';
            directionBtn.innerText = quizDirection === 'ch2en' ? '冒聼聰聞 盲赂颅芒聠聮猫聥卤' : '冒聼聰聞 猫聥卤芒聠聮盲赂颅';
            generateNewQuestion();
        }

        function disableOptions() { document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true); }
        function enableOptions() { document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = false); }
        function updateLevelDisplay() {
            document.getElementById('currentLevel').innerText = currentLevel;
            document.getElementById('levelProgress').innerText = levelQuestionsCount;
        }

        function speakWord(word) {
            if ('speechSynthesis' in window) {
                let utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US'; utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            } else alert("忙聜篓莽職聞忙碌聫猫搂聢氓聶篓盲赂聧忙聰炉忙聦聛猫炉颅茅聼鲁忙聹聴猫炉禄氓聤聼猫聝陆茫聙聜");
        }

        async function fetchPhonetic(word) {
            try {
                const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                if (response.ok) {
                    const data = await response.json();
                    if (data && data[0] && data[0].phonetic) return data[0].phonetic;
                } return '';
            } catch (error) { return ''; }
        }
        function updatePhoneticDisplay(phonetic) {
            const div = document.getElementById('phoneticDisplay');
            div.innerText = phonetic ? `/${phonetic}/` : '';
        }

        function initGame() {
            const storageKey = `wrongList_${currentPhone}`;
            const stored = localStorage.getItem(storageKey);
            wrongList = stored ? JSON.parse(stored) : [];
            renderWrongList();
            currentLevel = 1; levelQuestionsCount = 0; levelCorrectCount = 0;
            currentScore = 0; answeredCount = 0;
            updateScoreUI(); updateLevelDisplay();
            generateNewQuestion();
            document.getElementById('nextBtn').onclick = () => nextQuestion();
            document.getElementById('restartBtn').onclick = () => restartGame();
            document.getElementById('practiceAllBtn').onclick = () => practiceAllWrong();
            document.getElementById('clearWrongBtn').onclick = () => clearWrong();
            document.querySelectorAll('.bank-btn').forEach(btn => {
                btn.onclick = () => switchBank(btn.getAttribute('data-bank'));
            });
            if (pauseBtn) pauseBtn.onclick = togglePause;
            if (speakBtn) speakBtn.onclick = () => { if (currentQuestion) speakWord(currentQuestion.word); };
            if (directionBtn) directionBtn.onclick = toggleDirection;
        }
        function saveWrong() { localStorage.setItem(`wrongList_${currentPhone}`, JSON.stringify(wrongList)); }
        function updateScoreUI() {
            document.getElementById('score').innerText = currentScore;
            const acc = answeredCount === 0 ? 0 : Math.round((currentScore / answeredCount) * 100);
            document.getElementById('accuracy').innerText = acc;
        }

        function generateOptions(correctWord, correctMeaning) {
            let candidates = originalWords.filter(w => w.word !== correctWord);
            for (let i = candidates.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
            }
            let wrongWords = candidates.slice(0, 3).map(w => w.word);
            if (quizDirection === 'ch2en') {
                let options = [correctWord, ...wrongWords];
                for (let i = options.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [options[i], options[j]] = [options[j], options[i]];
                }
                return options.map(opt => ({ display: opt, value: opt }));
            } else {
                let wrongMeanings = wrongWords.map(w => originalWords.find(item => item.word === w).meaning);
                let options = [correctMeaning, ...wrongMeanings];
                for (let i = options.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [options[i], options[j]] = [options[j], options[i]];
                }
                return options.map(opt => ({ display: opt, value: opt }));
            }
        }

        function getCurrentWordPool() {
            if (currentMode === "wrongPractice" && wrongList.length > 0) return wrongList.map(w => ({ word: w.word, meaning: w.meaning }));
            return originalWords;
        }

        function generateNewQuestion() {
            if (isPaused) {
                isPaused = false; pauseBtn.innerHTML = '芒聫赂茂赂聫 忙職聜氓聛聹'; pauseBtn.style.background = '#5f7f9e';
            }
            stopTimer(); enableOptions();
            const pool = getCurrentWordPool();
            if (pool.length === 0) {
                document.getElementById('chineseWord').innerText = "冒聼聨聣 忙聛颅氓聳聹茂录聛忙虏隆忙聹聣氓聫炉莽禄聝盲鹿聽莽職聞氓聧聲猫炉聧盲潞聠茂录聛";
                document.getElementById('optionsContainer').innerHTML = "";
                document.getElementById('feedbackMsg').innerText = "莽聜鹿氓聡禄茫聙聦茅聡聧忙聳掳氓录聙氓搂聥茫聙聧莽禄搂莽禄颅茅職聫忙聹潞莽禄聝盲鹿聽";
                currentQuestion = null; return;
            }
            const randomIndex = Math.floor(Math.random() * pool.length);
            const selected = pool[randomIndex];
            currentQuestion = { word: selected.word, meaning: selected.meaning };
            if (quizDirection === 'ch2en') {
                document.getElementById('chineseWord').innerText = currentQuestion.meaning;
            } else {
                document.getElementById('chineseWord').innerText = currentQuestion.word;
            }
            currentOptions = generateOptions(currentQuestion.word, currentQuestion.meaning);
            renderOptions();
            document.getElementById('feedbackMsg').innerText = "";
            answered = false;
            startTimer();
            fetchPhonetic(currentQuestion.word).then(phonetic => updatePhoneticDisplay(phonetic));
        }

        function renderOptions() {
            const container = document.getElementById('optionsContainer');
            container.innerHTML = "";
            currentOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.display;
                btn.onclick = () => handleAnswer(opt.value);
                container.appendChild(btn);
            });
        }

        function handleAnswer(selectedValue) {
            if (answered || !currentQuestion) return;
            stopTimer();
            let isCorrect;
            if (quizDirection === 'ch2en') {
                isCorrect = (selectedValue === currentQuestion.word);
            } else {
                isCorrect = (selectedValue === currentQuestion.meaning);
            }
            answered = true;
            answeredCount++;
            levelQuestionsCount++;
            if (isCorrect) {
                currentScore++; levelCorrectCount++;
                document.getElementById('feedbackMsg').innerText = "芒聹聟 忙颅拢莽隆庐茂录聛";
                if (currentMode === "wrongPractice") {
                    const idx = wrongList.findIndex(w => w.word === currentQuestion.word);
                    if (idx !== -1) { wrongList.splice(idx, 1); saveWrong(); renderWrongList(); }
                    if (wrongList.length === 0) { currentMode = "normal"; document.getElementById('modeInfo').innerText = "冒聼聨虏 茅職聫忙聹潞忙篓隆氓录聫"; }
                }
                updateScoreUI(); updateLevelDisplay();
            } else {
                document.getElementById('feedbackMsg').innerHTML = `芒聺聦 茅聰聶猫炉炉茂录聛忙颅拢莽隆庐莽颅聰忙隆聢忙聵炉 ${currentQuestion.word}`;
                if (!wrongList.some(w => w.word === currentQuestion.word)) {
                    wrongList.push({ word: currentQuestion.word, meaning: currentQuestion.meaning });
                    saveWrong(); renderWrongList();
                }
                updateScoreUI(); updateLevelDisplay();
            }
            if (levelQuestionsCount >= LEVEL_SIZE) {
                const passRate = levelCorrectCount / LEVEL_SIZE;
                if (passRate >= LEVEL_PASS_RATE) {
                    currentLevel++; levelQuestionsCount = 0; levelCorrectCount = 0;
                    updateLevelDisplay();
                    alert(`冒聼聨聣 忙聛颅氓聳聹茅聙職猫驴聡莽卢卢 ${currentLevel-1} 氓聟鲁茂录聛猫驴聸氓聟楼莽卢卢 ${currentLevel} 氓聟鲁`);
                } else {
                    levelQuestionsCount = 0; levelCorrectCount = 0;
                    updateLevelDisplay();
                    alert(`芒聺聦 莽卢卢 ${currentLevel} 氓聟鲁忙聹陋茅聙職猫驴聡茂录聢忙颅拢莽隆庐莽聨聡${Math.round(passRate*100)}% < 80%茂录聣茂录聦猫炉路氓聨禄茅聰聶茅垄聵忙聹卢莽禄聝盲鹿聽氓聬聨茅聡聧忙聳掳忙聦聭忙聢聵忙聹卢氓聟鲁`);
                }
            }
            if (currentMode !== "wrongPractice") {
                generateNewQuestion();
            } else {
                disableOptions();
            }
        }

        function renderWrongList() {
            const container = document.getElementById('wrongList');
            if (wrongList.length === 0) { container.innerHTML = "<div style='color:gray;'>忙職聜忙聴聽茅聰聶茅垄聵茂录聦莽颅聰茅聰聶氓聬聨猫聡陋氓聤篓氓聡潞莽聨掳</div>"; return; }
            container.innerHTML = "";
            wrongList.forEach(item => {
                const div = document.createElement('div'); div.className = 'wrong-item';
                div.innerHTML = `<div><strong>${item.word}</strong> ${item.meaning}</div><button class="retry-single" data-word="${item.word}">茅聡聧氓聛職</button>`;
                container.appendChild(div);
            });
            document.querySelectorAll('.retry-single').forEach(btn => {
                btn.onclick = (e) => {
                    const word = btn.getAttribute('data-word');
                    const wrongItem = wrongList.find(w => w.word === word);
                    if (wrongItem) {
                        stopTimer();
                        currentMode = "wrongPractice";
                        document.getElementById('modeInfo').innerText = "芒職聽茂赂聫 茅聰聶茅垄聵莽禄聝盲鹿聽忙篓隆氓录聫茂录聢氓聧聲盲赂陋茅聡聧氓聛職茂录聣";
                        currentQuestion = { word: wrongItem.word, meaning: wrongItem.meaning };
                        if (quizDirection === 'ch2en') {
                            document.getElementById('chineseWord').innerText = currentQuestion.meaning;
                        } else {
                            document.getElementById('chineseWord').innerText = currentQuestion.word;
                        }
                        currentOptions = generateOptions(wrongItem.word, wrongItem.meaning);
                        renderOptions();
                        document.getElementById('feedbackMsg').innerText = "";
                        answered = false;
                        startTimer();
                        fetchPhonetic(currentQuestion.word).then(phonetic => updatePhoneticDisplay(phonetic));
                    }
                };
            });
        }

        function nextQuestion() {
            if (currentMode === "wrongPractice") {
                if (!answered && currentQuestion) { document.getElementById('feedbackMsg').innerText = "猫炉路氓聟聢莽颅聰氓炉鹿氓陆聯氓聣聧茅聰聶茅垄聵茂录聛"; return; }
                generateNewQuestion();
            } else {
                if (!answered && currentQuestion) { document.getElementById('feedbackMsg').innerText = "猫炉路氓聟聢氓聸聻莽颅聰氓陆聯氓聣聧茅垄聵莽聸庐茂录聛"; return; }
                generateNewQuestion();
            }
        }

        function restartGame() {
            stopTimer();
            currentScore = 0; answeredCount = 0; currentMode = "normal";
            currentLevel = 1; levelQuestionsCount = 0; levelCorrectCount = 0;
            document.getElementById('modeInfo').innerText = "冒聼聨虏 茅職聫忙聹潞忙篓隆氓录聫";
            wrongList = []; saveWrong(); renderWrongList();
            updateScoreUI(); updateLevelDisplay();
            generateNewQuestion();
        }

        function clearWrong() { wrongList = []; saveWrong(); renderWrongList(); if (currentMode === "wrongPractice") { currentMode = "normal"; document.getElementById('modeInfo').innerText = "冒聼聨虏 茅職聫忙聹潞忙篓隆氓录聫"; generateNewQuestion(); } }
        function practiceAllWrong() { if (wrongList.length === 0) { alert("茅聰聶茅垄聵忙聹卢盲赂潞莽漏潞茂录聦猫炉路氓聟聢莽颅聰茅聰聶盲赂聙盲潞聸茅垄聵莽聸庐"); return; } stopTimer(); currentMode = "wrongPractice"; document.getElementById('modeInfo').innerText = "芒職聽茂赂聫 茅聰聶茅垄聵莽禄聝盲鹿聽忙篓隆氓录聫茂录聢氓聟篓茅聝篓茅聰聶茅垄聵茂录聣"; generateNewQuestion(); }
        function switchBank(bank) {
            if (bank === currentBank) return;
            stopTimer();
            currentBank = bank;
            originalWords = bank === "waichong" ? [...WAICHONG_WORDS] : [...JUNIOR_WORDS];
            currentScore = 0; answeredCount = 0; currentMode = "normal";
            currentLevel = 1; levelQuestionsCount = 0; levelCorrectCount = 0;
            document.getElementById('modeInfo').innerText = "冒聼聨虏 茅職聫忙聹潞忙篓隆氓录聫";
            updateScoreUI(); updateLevelDisplay();
            generateNewQuestion();
            document.querySelectorAll('.bank-btn').forEach(btn => {
                if (btn.getAttribute('data-bank') === bank) btn.classList.add('bank-active');
                else btn.classList.remove('bank-active');
            });
        }
    </script>
</body>
