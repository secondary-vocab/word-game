<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>历史道法·中考冲刺800题</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #f0f2f5 0%, #e0e5ec 100%);
            font-family: 'Segoe UI', 'PingFang SC', Roboto, system-ui, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 56px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
            padding: 40px 28px;
            text-align: center;
        }
        .login-card h2 { font-size: 28px; margin-bottom: 10px; color: #1e293b; }
        .login-card p { color: #5b6e8c; margin-bottom: 30px; }
        .phone-input {
            width: 100%; padding: 14px 18px; font-size: 18px;
            border: 2px solid #e2e8f0; border-radius: 60px; text-align: center;
            margin-bottom: 20px; outline: none;
        }
        .phone-input:focus { border-color: #3b82f6; }
        .login-btn {
            background: #3b82f6; border: none; padding: 14px 20px;
            width: 100%; border-radius: 60px; font-size: 18px;
            font-weight: bold; color: white; cursor: pointer;
        }
        .login-btn:active { transform: scale(0.97); }
        .trial-footnote { margin-top: 24px; font-size: 13px; color: #5b6e8c; }
        .game-wrapper {
            max-width: 800px; width: 100%; background: white;
            border-radius: 48px; overflow: hidden; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.15);
        }
        .game-nav {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            padding: 18px 24px; color: white;
        }
        .subject-switch { display: flex; gap: 14px; margin-bottom: 16px; }
        .subject-btn {
            background: rgba(255,255,255,0.2); border: none; padding: 8px 20px;
            border-radius: 40px; color: white; font-weight: 600; cursor: pointer;
        }
        .subject-btn.active { background: white; color: #1e3a8a; }
        .stats-row {
            display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap; gap: 12px;
        }
        .score-box, .accuracy-box {
            background: rgba(0,0,0,0.2); padding: 6px 14px;
            border-radius: 40px; font-size: 0.85rem;
        }
        .wrongnote-btn {
            background: #f59e0b; border: none; padding: 6px 16px;
            border-radius: 40px; color: white; font-weight: bold; cursor: pointer;
        }
        .progress-area {
            background: #f8fafc; padding: 16px 24px;
            border-bottom: 1px solid #e2e8f0;
        }
        .level-info {
            display: flex; justify-content: space-between;
            font-size: 0.85rem; margin-bottom: 10px; color: #334155;
        }
        .progress-bar-bg {
            background: #e2e8f0; border-radius: 30px;
            height: 8px; overflow: hidden;
        }
        .progress-bar-fill {
            background: #3b82f6; width: 0%; height: 100%;
            transition: width 0.2s;
        }
        .question-area { padding: 24px 24px 12px; }
        .question-text {
            font-size: 1.35rem; font-weight: 600; line-height: 1.4;
            margin-bottom: 24px; color: #0f172a; word-break: break-word;
        }
        .stars-area {
            margin-bottom: 8px; font-size: 1rem; color: #f59e0b;
            letter-spacing: 2px;
        }
        .options-area {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 12px; margin-bottom: 20px;
        }
        .option-item {
            background: #f1f5f9; border: 2px solid #e2e8f0;
            border-radius: 60px; padding: 12px 16px; font-size: 0.9rem;
            text-align: left; cursor: pointer; color: #1e293b;
        }
        .option-item.correct-highlight {
            background: #bbf7d0; border-color: #22c55e;
        }
        .option-item.wrong-highlight {
            background: #fecaca; border-color: #ef4444;
        }
        .option-item.disabled-opt { cursor: default; opacity: 0.7; }
        .explain-area {
            background: #eef2ff; border-left: 5px solid #3b82f6;
            padding: 12px 16px; border-radius: 20px; font-size: 0.85rem;
            margin: 12px 0 8px; display: none; color: #1e293b;
        }
        .action-buttons {
            display: flex; gap: 12px; padding: 8px 24px 28px;
        }
        .redo-btn, .next-btn, .retry-level-btn {
            flex: 1; padding: 12px; border-radius: 60px;
            font-weight: bold; border: none; cursor: pointer; font-size: 1rem;
        }
        .redo-btn { background: #e2e8f0; color: #334155; }
        .next-btn { background: #3b82f6; color: white; }
        .retry-level-btn { background: #ef4444; color: white; }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; justify-content: center;
            align-items: center; z-index: 1000;
        }
        .modal-content {
            background: white; border-radius: 32px; padding: 28px;
            max-width: 90%; width: 360px; text-align: center;
        }
        .modal-content button {
            margin-top: 16px; padding: 10px 20px; border-radius: 40px;
            border: none; background: #3b82f6; color: white; cursor: pointer;
        }
        .wrongnote-modal {
            max-height: 70vh; overflow-y: auto; text-align: left;
        }
        .wrongnote-item {
            margin-bottom: 16px; padding: 12px; background: #f8fafc;
            border-radius: 16px;
        }
        .wrongnote-question { font-weight: 600; margin-bottom: 8px; }
        .wrongnote-answer { font-size: 0.85rem; color: #22c55e; }
    </style>
</head>
<body>
<div id="loginPanel" class="login-card">
    <h2>📚 历史·道法冲刺</h2>
    <p>输入手机号验证授权</p>
    <input type="tel" id="phoneNumber" class="phone-input" placeholder="11位手机号" maxlength="11">
    <button id="doLoginBtn" class="login-btn">验证并登录</button>
    <div class="trial-footnote">🧪 试用: 13900000000（前10题）<br>✅ 正式授权: 13971005659</div>
</div>
<div id="gameContainer" style="display: none;">
    <div class="game-wrapper">
        <div class="game-nav">
            <div class="subject-switch">
                <button class="subject-btn active" data-subject="history">📜 历史</button>
                <button class="subject-btn" data-subject="daofa">📖 道德与法治</button>
            </div>
            <div class="stats-row">
                <span class="score-box">🏆 得分: <span id="scoreValue">0</span></span>
                <span class="accuracy-box">📊 正确率: <span id="accuracyValue">0</span>%</span>
                <button class="wrongnote-btn" id="wrongNoteBtn">📋 错题本</button>
            </div>
        </div>
        <div class="progress-area">
            <div class="level-info">
                <span id="levelName">第1关 · 历史</span>
                <span id="questionProgress">0/20 题</span>
            </div>
            <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
        </div>
        <div class="question-area">
            <div class="stars-area" id="starsArea">⭐⭐⭐</div>
            <div class="question-text" id="questionText">加载中...</div>
            <div class="options-area" id="optionsArea"></div>
            <div class="explain-area" id="explainArea"></div>
        </div>
        <div class="action-buttons" id="actionButtons">
            <button class="redo-btn" id="redoBtn">🔄 重做本题</button>
            <button class="next-btn" id="nextBtn">下一题 ➡️</button>
        </div>
    </div>
</div><script>
    // ========== 授权系统 ==========
    let AUTHORIZED_PHONES = ["13971005659"];
    const TRIAL_PHONE = "13900000000";
    const TRIAL_MAX = 10;
    
    let currentPhone = "";
    let isFullAuth = false;
    let isTrial = false;
    let trialCount = 0;
    
    // ========== 全局状态 ==========
    let currentSubject = "history";
    let gameActive = true;
    let inWrongNoteMode = false;      // 是否在错题练习模式
    let wrongNoteQuestions = [];       // 当前学科的错题列表（存题目对象）
    
    // 每个学科的独立状态
    let subjectStates = {
        history: {
            currentLevel: 1,
            currentIndex: 0,
            levelScore: 0,
            levelAnswers: [],
            questions: [],
            wrongNotes: []      // 存储错题对象
        },
        daofa: {
            currentLevel: 1,
            currentIndex: 0,
            levelScore: 0,
            levelAnswers: [],
            questions: [],
            wrongNotes: []
        }
    };
    
    let MASTER_DAOFA = [];
    let MASTER_HISTORY = [];
    
    // DOM 元素
    let loginPanel, gameContainer, phoneInput, doLoginBtn;
    let questionTextEl, starsArea, optionsArea, explainArea;
    let scoreValueEl, accuracyValueEl, questionProgressEl, levelNameEl, progressFillEl;
    let redoBtn, nextBtn, wrongNoteBtn, actionButtons;
    
    // ========== 辅助函数 ==========
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    function getStarsByDifficulty(difficulty) {
        const star = '★', empty = '☆';
        let count = 2;
        if (difficulty === 'easy') count = 2;
        else if (difficulty === 'medium') count = 3;
        else if (difficulty === 'hard') count = 4;
        return star.repeat(count) + empty.repeat(5 - count);
    }
    
    function initDOM() {
        loginPanel = document.getElementById('loginPanel');
        gameContainer = document.getElementById('gameContainer');
        phoneInput = document.getElementById('phoneNumber');
        doLoginBtn = document.getElementById('doLoginBtn');
        questionTextEl = document.getElementById('questionText');
        starsArea = document.getElementById('starsArea');
        optionsArea = document.getElementById('optionsArea');
        explainArea = document.getElementById('explainArea');
        scoreValueEl = document.getElementById('scoreValue');
        accuracyValueEl = document.getElementById('accuracyValue');
        questionProgressEl = document.getElementById('questionProgress');
        levelNameEl = document.getElementById('levelName');
        progressFillEl = document.getElementById('progressFill');
        redoBtn = document.getElementById('redoBtn');
        nextBtn = document.getElementById('nextBtn');
        wrongNoteBtn = document.getElementById('wrongNoteBtn');
        actionButtons = document.getElementById('actionButtons');
        
        doLoginBtn.onclick = handleLogin;
        redoBtn.onclick = redoCurrentQuestion;
        nextBtn.onclick = nextQuestion;
        wrongNoteBtn.onclick = showWrongNotePanel;
        
        document.querySelectorAll('.subject-btn').forEach(btn => {
            btn.onclick = () => {
                let s = btn.dataset.subject;
                if (s === currentSubject) return;
                if (isTrial && s !== 'history') {
                    alert('试用模式仅开放历史学科');
                    return;
                }
                // 保存当前学科状态
                saveCurrentState();
                currentSubject = s;
                document.querySelectorAll('.subject-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                inWrongNoteMode = false;
                loadSubjectState();
                renderCurrentQuestion();
                updateUI();
            };
        });
    }
    
    function saveCurrentState() {
        let state = subjectStates[currentSubject];
        state.currentLevel = currentLevel;
        state.currentIndex = currentIndex;
        state.levelScore = levelScore;
        state.levelAnswers = [...levelAnswers];
        state.questions = [...currentQuestions];
        state.wrongNotes = [...wrongNoteQuestions];
    }
    
    function loadSubjectState() {
        let state = subjectStates[currentSubject];
        currentLevel = state.currentLevel;
        currentIndex = state.currentIndex;
        levelScore = state.levelScore;
        levelAnswers = [...state.levelAnswers];
        currentQuestions = state.questions.length ? [...state.questions] : getQuestionsForLevel(currentSubject, currentLevel);
        wrongNoteQuestions = [...state.wrongNotes];
        if (!currentQuestions.length) currentQuestions = getQuestionsForLevel(currentSubject, currentLevel);
        gameLocked = false;
        currentQuestionObj = null;
    }
    
    // 关卡相关变量（动态绑定到当前学科）
    let currentLevel = 1;
    let currentIndex = 0;
    let currentQuestions = [];
    let levelScore = 0;
    let levelAnswers = [];
    let gameLocked = false;
    let currentQuestionObj = null;
    
    function getQuestionsForLevel(subject, level) {
        let source = subject === 'history' ? MASTER_HISTORY : MASTER_DAOFA;
        if (!source.length) return [];
        let start = (level - 1) * 20;
        return source.slice(start, start + 20);
    }
    
    function loadLevel(level) {
        currentLevel = level;
        currentQuestions = getQuestionsForLevel(currentSubject, level);
        currentIndex = 0;
        levelScore = 0;
        levelAnswers = new Array(20).fill(undefined);
        gameLocked = false;
        currentQuestionObj = null;
        renderCurrentQuestion();
        updateUI();
        // 移除重做本关按钮如果存在
        let oldBtn = document.getElementById('dynamicRetryBtn');
        if (oldBtn) oldBtn.remove();
    }
    
    function updateUI() {
        let total = currentQuestions.length;
        let answered = levelAnswers.filter(v => v !== undefined).length;
        let percent = total ? (answered / total) * 100 : 0;
        progressFillEl.style.width = percent + '%';
        questionProgressEl.innerText = answered + '/' + total;
        let maxScore = total * 5;
        scoreValueEl.innerText = levelScore + '/' + maxScore;
        let correct = levelAnswers.filter(v => v === true).length;
        let accuracy = total ? Math.round(correct / total * 100) : 0;
        accuracyValueEl.innerText = accuracy;
        levelNameEl.innerText = `第${currentLevel}关 · ${currentSubject === 'history' ? '历史' : '道德与法治'}`;
    }
    
    function renderCurrentQuestion() {
        if (!currentQuestions.length || currentIndex >= currentQuestions.length) return;
        let q = currentQuestions[currentIndex];
        currentQuestionObj = q;
        questionTextEl.innerText = q.text;
        starsArea.innerText = getStarsByDifficulty(q.difficulty);
        
        optionsArea.innerHTML = '';
        q.options.forEach((opt, idx) => {
            let btn = document.createElement('button');
            btn.innerText = `${String.fromCharCode(65+idx)}. ${opt}`;
            btn.className = 'option-item';
            btn.onclick = () => handleAnswer(idx);
            optionsArea.appendChild(btn);
        });
        
        explainArea.classList.remove('show');
        explainArea.innerHTML = '';
        gameLocked = false;
        
        if (levelAnswers[currentIndex] !== undefined) {
            gameLocked = true;
            let btns = document.querySelectorAll('.option-item');
            btns.forEach(btn => btn.classList.add('disabled-opt'));
            btns[q.correct]?.classList.add('correct-highlight');
            if (q.explain) {
                explainArea.innerHTML = q.explain;
                explainArea.classList.add('show');
            }
        }
        updateUI();
    }
    
    function handleAnswer(selectedIdx) {
        if (gameLocked) return;
        let q = currentQuestionObj;
        let isCorrect = (selectedIdx === q.correct);
        
        if (isTrial && trialCount >= TRIAL_MAX) {
            explainArea.innerHTML = '🔒 试用次数已用完，请购买完整版授权';
            explainArea.classList.add('show');
            gameLocked = true;
            return;
        }
        
        levelAnswers[currentIndex] = isCorrect;
        if (isCorrect) {
            levelScore += 5;
        } else {
            // 记录错题（仅在非错题练习模式下记录）
            if (!inWrongNoteMode) {
                let alreadyExists = wrongNoteQuestions.some(w => w.text === q.text);
                if (!alreadyExists) {
                    wrongNoteQuestions.push({...q});
                    subjectStates[currentSubject].wrongNotes = [...wrongNoteQuestions];
                }
            }
        }
        
        if (isTrial) trialCount++;
        
        let btns = document.querySelectorAll('.option-item');
        btns.forEach((btn, i) => {
            btn.classList.add('disabled-opt');
            if (i === q.correct) btn.classList.add('correct-highlight');
            if (i === selectedIdx && i !== q.correct) btn.classList.add('wrong-highlight');
        });
        
        explainArea.innerHTML = q.explain || (isCorrect ? '✅ 正确！' : `❌ 错误，正确答案：${q.options[q.correct]}`);
        explainArea.classList.add('show');
        gameLocked = true;
        updateUI();
        
        if (isTrial && trialCount === TRIAL_MAX) setTimeout(() => alert('试用结束，已完成10题'), 200);
    }
    
    function redoCurrentQuestion() {
        if (!gameLocked) { alert('请先完成当前题目'); return; }
        let wasCorrect = levelAnswers[currentIndex];
        if (wasCorrect === true) levelScore -= 5;
        levelAnswers[currentIndex] = undefined;
        gameLocked = false;
        renderCurrentQuestion();
    }
    
    function nextQuestion() {
        if (!gameLocked) { alert('请先完成当前题目'); return; }
        if (currentIndex + 1 < currentQuestions.length) {
            currentIndex++;
            renderCurrentQuestion();
        } else {
            finishLevel();
        }
    }
    
    function finishLevel() {
        let total = currentQuestions.length;
        let correct = levelAnswers.filter(v => v === true).length;
        let rate = correct / total;
        if (rate >= 0.8) {
            if (currentLevel < 20) {
                alert(`🎉 过关！正确率 ${Math.round(rate*100)}%，进入第${currentLevel+1}关`);
                currentLevel++;
                loadLevel(currentLevel);
                // 保存状态
                saveCurrentState();
            } else {
                // 第20关通关祝贺
                showCompletionModal();
            }
        } else {
            // 未过关，显示重做本关按钮
            showRetryLevelButton();
            alert(`❌ 未过关，正确率 ${Math.round(rate*100)}%（需≥80%）`);
        }
    }
    
    function showRetryLevelButton() {
        let existing = document.getElementById('dynamicRetryBtn');
        if (existing) return;
        let btn = document.createElement('button');
        btn.id = 'dynamicRetryBtn';
        btn.innerText = '🔄 重做本关';
        btn.className = 'retry-level-btn';
        btn.onclick = () => {
            if (confirm('重做本关会重置当前关卡的进度，错题本保留。确定吗？')) {
                loadLevel(currentLevel);
                let btnRemove = document.getElementById('dynamicRetryBtn');
                if (btnRemove) btnRemove.remove();
            }
        };
        actionButtons.appendChild(btn);
    }
    
    function showCompletionModal() {
        let modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h2>🏆 恭喜通关！🎉</h2>
                <p>你已完成${currentSubject === 'history' ? '历史' : '道法'}全部20关！</p>
                <button id="restartBtn">重新开始</button>
                <button id="closeModalBtn">关闭</button>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('restartBtn').onclick = () => {
            currentLevel = 1;
            loadLevel(1);
            modal.remove();
        };
        document.getElementById('closeModalBtn').onclick = () => modal.remove();
    }
    
    function showWrongNotePanel() {
        if (wrongNoteQuestions.length === 0) {
            alert('暂无错题，继续加油！');
            return;
        }
        let modal = document.createElement('div');
        modal.className = 'modal';
        let wrongListHtml = wrongNoteQuestions.map((w, idx) => `
            <div class="wrongnote-item">
                <div class="wrongnote-question">${idx+1}. ${w.text}</div>
                <div class="wrongnote-answer">✅ 正确答案：${w.options[w.correct]}</div>
                <div class="wrongnote-answer">📝 ${w.explain || '无解析'}</div>
            </div>
        `).join('');
        modal.innerHTML = `
            <div class="modal-content wrongnote-modal">
                <h3>📖 错题本 (${wrongNoteQuestions.length}题)</h3>
                <div style="max-height: 50vh; overflow-y: auto;">${wrongListHtml}</div>
                <button id="redoWrongBtn">重做所有错题</button>
                <button id="closeWrongBtn">关闭</button>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('closeWrongBtn').onclick = () => modal.remove();
        document.getElementById('redoWrongBtn').onclick = () => {
            modal.remove();
            startWrongNoteMode();
        };
    }
    
    function startWrongNoteMode() {
        if (wrongNoteQuestions.length === 0) {
            alert('没有错题');
            return;
        }
        inWrongNoteMode = true;
        // 保存当前进度
        saveCurrentState();
        // 进入错题练习模式
        currentQuestions = [...wrongNoteQuestions];
        currentIndex = 0;
        levelScore = 0;
        levelAnswers = new Array(currentQuestions.length).fill(undefined);
        gameLocked = false;
        renderCurrentQuestion();
        updateUI();
        levelNameEl.innerText = `📖 错题练习模式 (${currentQuestions.length}题)`;
        // 修改按钮文字
        nextBtn.innerText = '下一题 ➡️';
        // 添加退出按钮
        let exitBtn = document.getElementById('exitWrongModeBtn');
        if (!exitBtn) {
            exitBtn = document.createElement('button');
            exitBtn.id = 'exitWrongModeBtn';
            exitBtn.innerText = '🚪 退出错题模式';
            exitBtn.className = 'redo-btn';
            exitBtn.onclick = () => {
                if (confirm('退出错题模式会回到原关卡进度，确定吗？')) {
                    exitWrongNoteMode();
                }
            };
            actionButtons.appendChild(exitBtn);
        }
    }
    
    function exitWrongNoteMode() {
        inWrongNoteMode = false;
        // 恢复原学科状态
        loadSubjectState();
        renderCurrentQuestion();
        updateUI();
        let exitBtn = document.getElementById('exitWrongModeBtn');
        if (exitBtn) exitBtn.remove();
        nextBtn.innerText = '下一题 ➡️';
    }
    
    function handleLogin() {
        let phone = phoneInput.value.trim();
        if (!phone || phone.length !== 11) return alert('请输入11位手机号');
        if (phone === TRIAL_PHONE) {
            isTrial = true; isFullAuth = false; trialCount = 0;
            startGame();
        } else if (AUTHORIZED_PHONES.includes(phone)) {
            isFullAuth = true; isTrial = false;
            startGame();
        } else {
            alert('未授权，试用请使用13900000000');
        }
    }
    
    function startGame() {
        loginPanel.style.display = 'none';
        gameContainer.style.display = 'block';
        // 初始化题库后启动
        if (MASTER_HISTORY.length && MASTER_DAOFA.length) {
            loadSubjectState();
            renderCurrentQuestion();
            updateUI();
        }
    }
    
    window.initGame = function() {
        initDOM();
        if (MASTER_HISTORY.length === 400 && MASTER_DAOFA.length === 400) {
            console.log('题库800题就绪');
            // 随机打乱题库顺序
            MASTER_HISTORY = shuffleArray(MASTER_HISTORY);
            MASTER_DAOFA = shuffleArray(MASTER_DAOFA);
            // 初始化每个学科的关卡题目
            for (let i = 1; i <= 20; i++) {
                subjectStates.history.questions = getQuestionsForLevel('history', 1);
                subjectStates.daofa.questions = getQuestionsForLevel('daofa', 1);
            }
        }
