<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>道法历史中考冲刺 - 智能闯关</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* 避免移动端长按菜单，不影响复制 */
        }
        body {
            background: linear-gradient(145deg, #f5f7fc 0%, #e9eef4 100%);
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        /* 主卡片 */
        .game-container {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 56px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1), 0 4px 12px rgba(0,0,0,0.06);
            overflow: hidden;
            backdrop-filter: blur(0px);
            transition: all 0.2s ease;
        }
        /* 头部 */
        .game-header {
            background: #1e2a3e;
            padding: 20px 28px;
            color: white;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            align-items: baseline;
        }
        .level-badge {
            background: rgba(255,255,255,0.2);
            padding: 6px 16px;
            border-radius: 80px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .score-area {
            background: #00000030;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: bold;
        }
        /* 关卡区 */
        .stage-bar {
            background: #fff3e0;
            padding: 12px 28px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ffdfb0;
            font-weight: bold;
            color: #b45f1b;
        }
        /* 题目卡片 */
        .question-card {
            padding: 32px 28px 20px 28px;
        }
        .question-text {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 24px;
            color: #1f2937;
        }
        /* 难度星星 */
        .difficulty-stars {
            margin-bottom: 24px;
            font-size: 1.4rem;
            letter-spacing: 6px;
            color: #ffb800;
        }
        /* 选项区 */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin: 28px 0;
        }
        .option-btn {
            background: #f3f4f6;
            border: 2px solid #e5e7eb;
            border-radius: 100px;
            padding: 14px 20px;
            font-size: 1rem;
            text-align: left;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
            color: #1f2937;
        }
        /* 去掉红圈禁止符 — 正常鼠标 */
        .option-btn.disabled-option, .option-btn:disabled {
            cursor: default;
            opacity: 0.7;
            background: #eef2ff;
            border-color: #cbd5e1;
        }
        .option-btn.correct-feedback {
            background: #d1fae5;
            border-color: #10b981;
        }
        .option-btn.wrong-feedback {
            background: #fee2e2;
            border-color: #ef4444;
        }
        .next-area {
            display: flex;
            justify-content: center;
            margin: 10px 0 28px;
        }
        .next-btn {
            background: #3b82f6;
            border: none;
            padding: 14px 32px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
            cursor: pointer;
            width: 80%;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .next-btn:active { transform: scale(0.96);}
        .feedback {
            background: #fef9c3;
            margin: 0 28px 24px;
            padding: 14px;
            border-radius: 28px;
            font-size: 0.9rem;
            text-align: center;
        }
        .result-area {
            background: #f1f5f9;
            margin: 20px;
            padding: 20px;
            border-radius: 36px;
            text-align: center;
        }
        button {
            background: none;
            border: none;
        }
        .phone-login {
            background: #f8fafc;
            padding: 24px;
            border-radius: 40px;
            margin: 20px;
            text-align: center;
        }
        .phone-input {
            padding: 12px;
            font-size: 1rem;
            border-radius: 60px;
            border: 1px solid #ccc;
            width: 80%;
            text-align: center;
        }
        .login-btn {
            background: #0f172a;
            color: white;
            padding: 10px 28px;
            border-radius: 60px;
            margin-top: 12px;
            cursor: pointer;
        }
        .small-note {
            font-size: 0.75rem;
            color: #4b5563;
            margin-top: 12px;
        }
        .locked-area {
            text-align: center;
            padding: 40px;
        }
        hr {
            margin: 16px 0;
        }
    </style>
</head>
<body>
<div class="game-container" id="app">
    <!-- 手机号验证界面 -->
    <div id="loginPanel" class="phone-login">
        <h3>📱 登录验证</h3>
        <p>输入手机号，验证授权状态</p>
        <input type="tel" id="phoneNumber" class="phone-input" placeholder="11位手机号" maxlength="11">
        <br>
        <button id="doLoginBtn" class="login-btn">验证 / 登录</button>
        <div class="small-note">试用手机：13900000000（前10题）<br>正式授权联系客服开通</div>
    </div>

    <!-- 主游戏界面（先隐藏） -->
    <div id="gamePanel" style="display:none;">
        <div class="game-header">
            <span class="level-badge" id="levelDisplay">第1关 · 历史入门</span>
            <span class="score-area" id="scoreDisplay">得分: 0 / 100</span>
        </div>
        <div class="stage-bar">
            <span>📚 正确 ≥16/20 过关</span>
            <span id="progressDisplay">0/20 题</span>
        </div>
        <div class="question-card">
            <div class="difficulty-stars" id="starDisplay">⭐⭐⭐</div>
            <div class="question-text" id="questionText">加载中...</div>
            <div class="options-grid" id="optionsContainer"></div>
            <div class="next-area">
                <button id="nextBtn" class="next-btn">下一题 ➡️</button>
            </div>
        </div>
        <div id="feedbackMsg" class="feedback"></div>
        <div id="resultArea" class="result-area" style="display:none;"></div>
    </div>
</div>

            levelQuestions.push({...medium[idx]});

        for(let i=0; i<4; i++) {
            const idx = ((level-1)*4 + i) % hard.length;
            levelQuestions.push({...hard[idx]});

            // 已作答未点下一题
        }
        if(currentGameIndex + 1 < currentGameQuestions.length) {

            currentGameIndex++;

        } else {
            // 关卡结束，计算是否过关（正确率≥80%）
            const totalQuestions = currentGameQuestions.length;
            const correctCount = currentGameAnswers.filter(v => v === true).length;
            const passRate = correctCount / totalQuestions;
            const isPass = passRate >= 0.8;
            
            if(isPass) {
                // 过关
                if(currentGameLevel < 20) {
                    // 进入下一关
                    feedbackMsg.innerHTML = `🎉 恭喜过关！正确率${Math.round(passRate*100)}%，进入第${currentGameLevel+1}关`;

                        currentGameLevel++;

                        feedbackMsg.innerHTML = '';
                    });
                } else {

                    resultArea.style.display = 'block';

                        loadLevel(currentGameSubject, 1);
                        resultArea.style.display = 'none';

                }
            } else {

                resultArea.style.display = 'block';
                resultArea.innerHTML = `<h3>😭 闯关失败</h3><p>本关得分:${currentGameScore}/${totalQuestions*5}</p><p>正确率:${Math.round(passRate*100)}% (需≥80%)</p><p>请重新挑战当前关卡</p><button id="retryLevelBtn" class="login-btn">重新挑战第${currentGameLevel}关</button>`;

            retryBtn.addEventListener('click', () => {
                if(confirm('确定重新开始当前关卡吗？当前进度会丢失')) {
                    loadLevel(currentGameSubject, currentGameLevel);
                }
            });
            nextArea.appendChild(retryBtn);
        }
    }
    
    // 覆盖 renderCurrentQuestion 添加重玩按钮
    const finalRender = function() {
        if(!currentGameQuestions.length) return;
        const q = currentGameQuestions[currentGameIndex];
        questionText.innerText = q.text;
        starDisplay.innerText = renderStars(q.difficulty);
        
        optionsContainer.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.innerText = `${String.fromCharCode(65+idx)}. ${opt}`;
            btn.className = 'option-btn';
            btn.addEventListener('click', () => handleAnswer(idx));
            optionsContainer.appendChild(btn);
        });
        
        progressDisplay.innerText = `${currentGameIndex+1}/${currentGameQuestions.length} 题`;
        scoreDisplay.innerText = `得分: ${currentGameScore} / ${currentGameQuestions.length*5}`;
        
        feedbackMsg.innerHTML = feedbackMsg.innerHTML || (isTrial ? '<span style="color:#f59e0b;">🔓 试用模式：前10题体验</span>' : '');
        waitingForNext = false;
        gameLocked = false;
        
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.disabled = false;
            btn.classList.remove('correct-feedback', 'wrong-feedback', 'disabled-option');
        });
        
        addSubjectSwitcher();
        addWrongNoteButton();
        addRetryButton();
    };
    
    window.renderCurrentQuestion = finalRender;
    
    // ================= 最终启动 =================
    // 确保DOM加载完成后绑定正确的事件
    document.addEventListener('DOMContentLoaded', () => {
        initDOM();
        MASTER_QUESTIONS = buildFullQuestionsFinal();
        const savedAuth = localStorage.getItem('authorizedPhones');
        if(savedAuth) authorizedPhones = JSON.parse(savedAuth);
        
        // 检查URL参数快速登录（便于测试）
        const urlParams = new URLSearchParams(window.location.search);
        const testPhone = urlParams.get('phone');
        if(testPhone === '13900000000') {
            phoneInput.value = testPhone;
            handleLogin();
        }
    });
    
    // 导出部分变量供调试
    window.debugGame = {
        daofaCount: () => daofaQuestions.length,
        historyCount: () => historyQuestions.length,
        totalCount: () => MASTER_QUESTIONS.length,
        resetAuth: () => { localStorage.removeItem('authorizedPhones'); authorizedPhones = []; },
        addAuth: (phone) => { authorizedPhones.push(phone); localStorage.setItem('authorizedPhones', JSON.stringify(authorizedPhones)); }
    };
    
    console.log('第6段完成：最终合并、启动修复、重玩按钮、调试工具已就绪');</script>
</body>
</html>
