<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>中考冲刺 · 历史&道法选择题库</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .login-container {
            max-width: 500px;
            margin: 80px auto;
            background: white;
            border-radius: 32px;
            padding: 30px 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        .game-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            max-width: 1300px;
            margin: 0 auto;
            align-items: flex-start;
        }
        .quiz-area {
            flex: 2;
            min-width: 280px;
            background: white;
            border-radius: 32px;
            padding: 24px 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .wrong-area {
            flex: 1;
            min-width: 260px;
            background: #fff9ef;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            position: sticky;
            top: 20px;
            max-height: 80vh;
            overflow-y: auto;
        }
        h1 { font-size: 1.8rem; color: #1e3c72; margin-bottom: 5px; }
        .sub { color: #4a6f8f; margin-bottom: 20px; }
        .wordbank-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            justify-content: center;
        }
        .bank-btn {
            background: #e2edf7;
            border: none;
            border-radius: 30px;
            padding: 6px 16px;
            cursor: pointer;
            font-weight: 500;
        }
        .bank-active {
            background: #2c7da0;
            color: white;
        }
        .score-bar {
            display: flex;
            justify-content: space-between;
            background: #eef3fc;
            padding: 12px 20px;
            border-radius: 60px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .timer-bar {
            background: #eef3fc;
            border-radius: 60px;
            padding: 8px 20px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }
        .level-info {
            background: #eef3fc;
            border-radius: 60px;
            padding: 8px 20px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }
        .question-text {
            font-size: 1.2rem;
            line-height: 1.5;
            margin: 15px 0;
            color: #1e3c72;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        .option-btn {
            background: #f8fafd;
            border: 1px solid #cbdde9;
            border-radius: 60px;
            padding: 12px 18px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
            color: #1e3c72;
        }
        .option-btn:hover {
            background: #e9f0f8;
            transform: scale(0.98);
        }
        .option-btn:disabled {
            background: #e0e7ef;
            cursor: not-allowed;
            transform: none;
        }
        .feedback {
            font-weight: bold;
            font-size: 1rem;
            margin: 15px 0;
            padding: 10px;
            border-radius: 16px;
            background: #eef3fc;
            color: #2c7da0;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }
        .next-btn, .restart-btn {
            flex: 1;
            background: #2c7da0;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        .restart-btn {
            background: #5f7f9e;
        }
        .wrong-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .wrong-list {
            background: #fff2e0;
            border-radius: 20px;
            padding: 8px;
            max-height: 50vh;
            overflow-y: auto;
        }
        .wrong-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 8px;
            border-bottom: 1px solid #ffd9a5;
        }
        .wrong-item strong {
            font-size: 0.9rem;
        }
        .retry-single {
            background: #ffb347;
            border: none;
            border-radius: 30px;
            padding: 4px 10px;
            cursor: pointer;
            color: white;
            font-size: 0.75rem;
        }
        .mode-badge {
            font-size: 0.8rem;
            background: #e2edf7;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            margin-bottom: 15px;
        }
        .star-rating {
            font-size: 0.8rem;
            color: #f5b042;
            margin-left: 8px;
        }
        .hidden {
            display: none;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 60px;
            border: 1px solid #cbdde9;
            font-size: 1rem;
        }
        button {
            background: #2c7da0;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        .error {
            color: #d9534f;
            margin-top: 12px;
        }
        @media (max-width: 800px) {
            .game-wrapper {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div id="loginContainer" class="login-container">
        <h2>📱 手机号登录</h2>
        <p>输入已授权的手机号</p>
        <input type="tel" id="phoneNumber" placeholder="手机号" value="">
        <button id="loginBtn">登录</button>
        <div id="loginError" class="error"></div>
    </div>

    <div id="gameContent" class="hidden">
        <div class="game-wrapper">
            <div class="quiz-area">
                <h1>📖 中考历史道法冲刺</h1>
                <div class="sub">历史·道法双科选择题库</div>
                <div class="wordbank-selector">
                    <button class="bank-btn bank-active" data-bank="history">历史冲刺20题</button>
                    <button class="bank-btn" data-bank="morality">道法冲刺20题</button>
                </div>
                <div class="score-bar">
                    <span>✅ 得分: <span id="score">0</span></span>
                    <span>📊 正确率: <span id="accuracy">0</span>%</span>
                </div>
                <div class="timer-bar" style="display: none;">⏱️ 倒计时已取消（文科不限时）</div>
                <div class="level-info">📚 总计 <span id="totalQuestions">20</span> 题 · 当前进度 <span id="progress">0</span>/<span id="totalProgress">20</span></div>
                <div id="modeInfo" class="mode-badge">🎲 随机模式</div>
                <div id="questionText" class="question-text">加载中...</div>
                <div id="starRating" class="star-rating"></div>
                <div class="options" id="optionsContainer"></div>
                <div class="feedback" id="feedbackMsg"></div>
                <div class="action-buttons">
                    <button class="next-btn" id="nextBtn">下一题</button>
                    <button class="restart-btn" id="restartBtn">重新开始</button>
                </div>
            </div>
            <div class="wrong-area">
                <div class="wrong-header">
                    <span>📘 错题本</span>
                    <div>
                        <button id="practiceAllBtn" style="background:none; border:none; color:#2c7da0; text-decoration:underline;">练习所有错题</button>
                        <button id="clearWrongBtn" style="background:none; border:none; color:#2c7da0; text-decoration:underline;">清空错题</button>
                    </div>
                </div>
                <div id="wrongList" class="wrong-list">暂无错题</div>
            </div>
        </div>
    </div>

    <script>
        const ALLOWED_PHONES = ['13971005659', '13900000000'];  // 试用号13900000000
        const TRIAL_PHONE = '13900000000';
        const TRIAL_LIMIT = 10;  // 试用号只能做10题
        
        let currentPhone = null;
        let isTrial = false;
        let trialAnsweredCount = 0;
        
        let currentBank = "history";
        let originalQuestions = [];
        let wrongList = [];
        let currentMode = "normal";
        let currentQuestion = null;
        let currentOptions = [];
        let answered = false;
        let currentScore = 0;
        let answeredCount = 0;
        let totalQuestionsCount = 20;

        // ==================== 历史题库 (20题) ====================
        const HISTORY_QUESTIONS = [            // 历史题1-20
            { text: "“夏传子，家天下。四百载，迁夏社。”这句歌谣描述的朝代是？", options: ["夏朝", "商朝", "周朝", "秦朝"], answer: "夏朝", explanation: "禹死后，启继承王位，世袭制代替禅让制，开始了“家天下”的历史，夏朝建立。", stars: 2 },
            { text: "下列哪项是商鞅变法的内容？", options: ["实行分封制", "奖励军功", "推行科举制", "设立丞相"], answer: "奖励军功", explanation: "商鞅变法奖励军功，按军功授予爵位，提高了军队战斗力。", stars: 3 },
            { text: "秦统一六国后，规定在全国统一使用的货币是？", options: ["刀币", "布币", "半两钱", "五铢钱"], answer: "半两钱", explanation: "秦始皇统一货币，规定以圆形方孔的“半两钱”为全国通行货币。", stars: 2 },
            { text: "“丝绸之路”的开通与下列哪位历史人物关系最大？", options: ["张骞", "班超", "卫青", "霍去病"], answer: "张骞", explanation: "张骞出使西域，促进了汉朝与西域各国的联系，为丝绸之路的开通奠定了基础。", stars: 2 },
            { text: "北魏孝文帝改革中，迁都至哪座城市？", options: ["平城", "洛阳", "长安", "许昌"], answer: "洛阳", explanation: "孝文帝为学习汉族文化，加强对黄河流域的控制，将都城从平城迁到洛阳。", stars: 3 },
            { text: "科举制度正式确立的标志是？", options: ["分科考试", "进士科创立", "殿试成为定制", "八股取士"], answer: "进士科创立", explanation: "隋炀帝创立进士科，标志着科举制度正式形成。", stars: 3 },
            { text: "唐太宗被北方各族尊称为？", options: ["天可汗", "成吉思汗", "大汗", "圣主"], answer: "天可汗", explanation: "唐太宗实行开明的民族政策，被北方各族尊称为“天可汗”。", stars: 2 },
            { text: "北宋时期，世界上最早的纸币“交子”出现在？", options: ["四川", "河南", "浙江", "广东"], answer: "四川", explanation: "北宋时期，四川地区商业繁荣，为方便交易，出现了世界上最早的纸币“交子”。", stars: 2 },
            { text: "元朝时，形成了一个新的民族是？", options: ["回族", "满族", "藏族", "蒙古族"], answer: "回族", explanation: "元朝时，来自中亚、西亚的波斯人、阿拉伯人等长期与汉、蒙等族杂居，逐渐形成了一个新的民族——回族。", stars: 3 },
            { text: "郑成功最大的历史功绩是？", options: ["收复台湾", "抗击倭寇", "七下西洋", "统一女真"], answer: "收复台湾", explanation: "郑成功率军东渡，从荷兰殖民者手中收复台湾，维护了国家领土完整。", stars: 2 },
            { text: "中国近代史上第一个不平等条约是？", options: ["《南京条约》", "《北京条约》", "《马关条约》", "《辛丑条约》"], answer: "《南京条约》", explanation: "1842年，清政府与英国签订《南京条约》，是中国近代史上第一个丧权辱国的不平等条约。", stars: 2 },
            { text: "洋务运动提出的口号是？", options: ["自强、求富", "扶清灭洋", "民主、科学", "师夷长技"], answer: "自强、求富", explanation: "洋务运动前期以“自强”为口号，后期以“求富”为口号，兴办了一批近代军事和民用工业。", stars: 2 },
            { text: "辛亥革命首先爆发于哪个城市？", options: ["武昌", "广州", "南京", "北京"], answer: "武昌", explanation: "1911年10月10日，武昌起义爆发，揭开了辛亥革命的序幕。", stars: 2 },
            { text: "新文化运动中提倡白话文，发表《狂人日记》的是？", options: ["鲁迅", "胡适", "陈独秀", "李大钊"], answer: "鲁迅", explanation: "鲁迅的白话小说《狂人日记》，深刻揭露了封建礼教的吃人本质，是新文化运动的代表作。", stars: 2 },
            { text: "打响了武装反抗国民党反动统治第一枪的起义是？", options: ["武昌起义", "南昌起义", "秋收起义", "广州起义"], answer: "南昌起义", explanation: "1927年8月1日，南昌起义爆发，标志着中国共产党独立领导革命战争、创建人民军队的开始。", stars: 3 },
            { text: "长征途中，中国共产党召开的一次具有生死攸关转折意义的会议是？", options: ["八七会议", "古田会议", "遵义会议", "瓦窑堡会议"], answer: "遵义会议", explanation: "遵义会议确立了毛泽东在党和红军中的领导地位，挽救了党和红军，是党历史上生死攸关的转折点。", stars: 3 },
            { text: "日本发动全面侵华战争的标志是？", options: ["九一八事变", "一·二八事变", "七七事变", "八一三事变"], answer: "七七事变", explanation: "1937年7月7日，卢沟桥事变爆发，标志着日本全面侵华战争开始。", stars: 2 },
            { text: "解放战争中，揭开了人民解放军战略进攻序幕的是？", options: ["辽沈战役", "淮海战役", "平津战役", "千里跃进大别山"], answer: "千里跃进大别山", explanation: "1947年夏，刘邓大军千里挺进大别山，揭开了人民解放军战略进攻的序幕。", stars: 3 },
            { text: "新中国成立后，为巩固政权进行的土地改革法律依据是？", options: ["《中国土地法大纲》", "《中华人民共和国土地改革法》", "《共同纲领》", "《宪法》"], answer: "《中华人民共和国土地改革法》", explanation: "1950年，中央人民政府颁布《中华人民共和国土地改革法》，在新解放区进行土地改革。", stars: 3 },
            { text: "2023年，中国迎来改革开放多少周年？", options: ["40周年", "45周年", "50周年", "55周年"], answer: "45周年", explanation: "改革开放始于1978年，到2023年正好是45周年。", stars: 2 },
        ];

        // ==================== 道法题库 (20题) ====================
        const MORALITY_QUESTIONS = [
            { text: "中国特色社会主义最本质的特征是？", options: ["人民民主专政", "中国共产党领导", "依法治国", "以德治国"], answer: "中国共产党领导", explanation: "中国共产党领导是中国特色社会主义最本质的特征，是中国特色社会主义制度的最大优势。", stars: 2 },
            { text: "我国的根本政治制度是？", options: ["人民代表大会制度", "民族区域自治制度", "基层群众自治制度", "中国共产党领导的多党合作和政治协商制度"], answer: "人民代表大会制度", explanation: "人民代表大会制度是我国的根本政治制度，是人民当家作主的根本途径和最高实现形式。", stars: 2 },
            { text: "全面依法治国的总目标是？", options: ["建设中国特色社会主义法治体系，建设社会主义法治国家", "建设法治政府", "提高全民法治素养", "完善法律体系"], answer: "建设中国特色社会主义法治体系，建设社会主义法治国家", explanation: "全面推进依法治国，总目标是建设中国特色社会主义法治体系，建设社会主义法治国家。", stars: 3 },
            { text: "中国梦的核心内涵是？", options: ["国家富强", "民族振兴", "人民幸福", "以上都是"], answer: "以上都是", explanation: "实现中华民族伟大复兴，是近代以来中国人民最伟大的梦想，其本质是国家富强、民族振兴、人民幸福。", stars: 2 },
            { text: "“绿水青山就是金山银山”体现的发展理念是？", options: ["创新发展", "协调发展", "绿色发展", "开放发展"], answer: "绿色发展", explanation: "这句话体现了绿色发展理念，强调保护生态环境就是保护生产力，改善生态环境就是发展生产力。", stars: 2 },
            { text: "我国社会的主要矛盾已经转化为？", options: ["人民日益增长的物质文化需要同落后的社会生产之间的矛盾", "人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾", "经济发展与环境保护之间的矛盾", "城乡发展不平衡的矛盾"], answer: "人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾", explanation: "党的十九大指出，我国社会主要矛盾已经转化为人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾。", stars: 3 },
            { text: "2025年《政府工作报告》中，强调要加快发展？", options: ["传统产业", "新质生产力", "劳动密集型产业", "资源型产业"], answer: "新质生产力", explanation: "2025年《政府工作报告》提出，要大力推进现代化产业体系建设，加快发展新质生产力。", stars: 3 },
            { text: "神舟十八号飞船发射成功，这主要体现了我国在哪个领域的成就？", options: ["经济建设", "政治建设", "文化建设", "科技创新"], answer: "科技创新", explanation: "神舟十八号的成功发射，是我国在航天科技领域取得的重大成就，体现了我国科技创新的实力。", stars: 2 },
            { text: "我国处理民族关系的基本原则是？", options: ["民族平等、民族团结、各民族共同繁荣", "大杂居、小聚居", "民族区域自治", "尊重少数民族风俗习惯"], answer: "民族平等、民族团结、各民族共同繁荣", explanation: "我国处理民族关系的基本原则是民族平等、民族团结、各民族共同繁荣。", stars: 2 },
            { text: "社会主义民主政治的本质特征是？", options: ["党的领导", "依法治国", "人民当家作主", "民主集中制"], answer: "人民当家作主", explanation: "人民当家作主是社会主义民主政治的本质特征，是社会主义民主政治的核心。", stars: 2 },
            { text: "以下哪个是中国特色社会主义的“四个自信”之一？", options: ["道路自信", "经济自信", "军事自信", "外交自信"], answer: "道路自信", explanation: "“四个自信”是指道路自信、理论自信、制度自信、文化自信。", stars: 2 },
            { text: "“一带一路”倡议中的“一带”是指？", options: ["丝绸之路经济带", "21世纪海上丝绸之路", "长江经济带", "京津冀协同发展带"], answer: "丝绸之路经济带", explanation: "“一带一路”是“丝绸之路经济带”和“21世纪海上丝绸之路”的简称。", stars: 2 },
            { text: "我国宪法规定，中华人民共和国的一切权力属于？", options: ["人民", "中国共产党", "全国人民代表大会", "中央人民政府"], answer: "人民", explanation: "《中华人民共和国宪法》规定：中华人民共和国的一切权力属于人民。", stars: 2 },
            { text: "以下哪项是公民的基本义务？", options: ["依法纳税", "言论自由", "宗教信仰自由", "人身自由"], answer: "依法纳税", explanation: "依法纳税是公民的基本义务，也是公民对国家的责任。", stars: 2 },
            { text: "“双减”政策主要针对的是？", options: ["义务教育阶段学生作业负担和校外培训负担", "高中教育阶段升学压力", "大学生就业压力", "教师教学负担"], answer: "义务教育阶段学生作业负担和校外培训负担", explanation: "“双减”指减轻义务教育阶段学生过重作业负担和校外培训负担。", stars: 3 },
            { text: "在武汉，被称为“天下江山第一楼”的是？", options: ["黄鹤楼", "晴川阁", "古琴台", "归元寺"], answer: "黄鹤楼", explanation: "黄鹤楼位于武汉长江南岸，享有“天下江山第一楼”的美誉。", stars: 1 },
            { text: "“高山流水”的故事发生在武汉的哪个地方？", options: ["古琴台", "黄鹤楼", "晴川阁", "东湖"], answer: "古琴台", explanation: "古琴台是纪念俞伯牙和钟子期“高山流水觅知音”的地方，位于武汉汉阳。", stars: 2 },
            { text: "以下哪项体现了创新精神？", options: ["墨守成规", "故步自封", "因循守旧", "勇于探索"], answer: "勇于探索", explanation: "创新精神要求我们敢于突破常规，勇于探索未知。", stars: 1 },
            { text: "“己所不欲，勿施于人”体现了什么道德准则？", options: ["换位思考", "诚实守信", "乐于助人", "爱岗敬业"], answer: "换位思考", explanation: "这句话强调要站在他人角度思考问题，自己不想要的不要强加给别人，体现了换位思考的道德准则。", stars: 2 },
            { text: "在我国，有权解释宪法的机关是？", options: ["全国人民代表大会", "全国人民代表大会常务委员会", "国务院", "最高人民法院"], answer: "全国人民代表大会常务委员会", explanation: "根据《宪法》规定，全国人民代表大会常务委员会有权解释宪法。", stars: 3 },
        ];        // 初始化题库
        function getCurrentQuestions() {
            return currentBank === "history" ? HISTORY_QUESTIONS : MORALITY_QUESTIONS;
        }
        
        // 进度保存
        function saveGameProgress() {
            const storageKey = `progress_${currentPhone}_${currentBank}`;
            localStorage.setItem(storageKey, JSON.stringify({
                answeredCount: answeredCount,
                currentScore: currentScore,
                wrongList: wrongList,
                trialAnsweredCount: trialAnsweredCount
            }));
        }
        
        function loadGameProgress() {
            const storageKey = `progress_${currentPhone}_${currentBank}`;
            const saved = localStorage.getItem(storageKey);
            if (saved) {
                const data = JSON.parse(saved);
                answeredCount = data.answeredCount || 0;
                currentScore = data.currentScore || 0;
                wrongList = data.wrongList || [];
                trialAnsweredCount = data.trialAnsweredCount || 0;
                renderWrongList();
                updateScoreUI();
                document.getElementById('progress').innerText = answeredCount;
            }
        }
        
        // 登录逻辑（含试用限制）
        const loginContainer = document.getElementById('loginContainer');
        const gameContainer = document.getElementById('gameContent');
        const phoneInput = document.getElementById('phoneNumber');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        
        function doLogin() {
            const phone = phoneInput.value.trim();
            if (!phone) {
                loginError.innerText = '请输入手机号';
                return;
            }
            if (!ALLOWED_PHONES.includes(phone)) {
                loginError.innerText = '该手机号未获得授权，请联系客服购买。';
                return;
            }
            currentPhone = phone;
            isTrial = (phone === TRIAL_PHONE);
            loginContainer.classList.add('hidden');
            gameContainer.classList.remove('hidden');
            initGame();
        }
        
        loginBtn.onclick = doLogin;
        phoneInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') doLogin(); });
        
        // 游戏逻辑
        let currentQuestionsList = [];
        
        function initGame() {
            loadGameProgress();
            currentQuestionsList = getCurrentQuestions();
            totalQuestionsCount = currentQuestionsList.length;
            document.getElementById('totalQuestions').innerText = totalQuestionsCount;
            document.getElementById('totalProgress').innerText = totalQuestionsCount;
            document.getElementById('progress').innerText = answeredCount;
            if (answeredCount >= totalQuestionsCount) {
                document.getElementById('questionText').innerText = "🎉 恭喜！已完成全部题目！";
                document.getElementById('optionsContainer').innerHTML = "";
                document.getElementById('feedbackMsg').innerHTML = "点击「重新开始」继续练习";
                return;
            }
            generateNewQuestion();
            document.getElementById('nextBtn').onclick = () => nextQuestion();
            document.getElementById('restartBtn').onclick = () => restartGame();
            document.getElementById('practiceAllBtn').onclick = () => practiceAllWrong();
            document.getElementById('clearWrongBtn').onclick = () => clearWrong();
            document.querySelectorAll('.bank-btn').forEach(btn => {
                btn.onclick = () => switchBank(btn.getAttribute('data-bank'));
            });
        }
        
        function updateScoreUI() {
            document.getElementById('score').innerText = currentScore;
            const acc = answeredCount === 0 ? 0 : Math.round((currentScore / answeredCount) * 100);
            document.getElementById('accuracy').innerText = acc;
        }
        
        function generateNewQuestion() {
            if (isTrial && trialAnsweredCount >= TRIAL_LIMIT) {
                document.getElementById('questionText').innerHTML = "⚠️ 试用已达上限（10题），请购买后继续刷题。";
                document.getElementById('optionsContainer').innerHTML = "";
                document.getElementById('feedbackMsg').innerHTML = "联系客服购买完整版。";
                return;
            }
            const available = currentQuestionsList.filter((_, idx) => !wrongList.some(w => w.questionIdx === idx));
            const pool = currentMode === "wrongPractice" && wrongList.length > 0 ? wrongList.map(w => ({ ...currentQuestionsList[w.questionIdx], idx: w.questionIdx })) : currentQuestionsList.map((q, idx) => ({ ...q, idx }));
            if (pool.length === 0) {
                document.getElementById('questionText').innerText = "🎉 恭喜！没有可练习的题目了！";
                document.getElementById('optionsContainer').innerHTML = "";
                document.getElementById('feedbackMsg').innerText = "点击「重新开始」继续随机练习";
                return;
            }
            const randomIndex = Math.floor(Math.random() * pool.length);
            const selected = pool[randomIndex];
            currentQuestion = { text: selected.text, options: selected.options, answer: selected.answer, explanation: selected.explanation, stars: selected.stars, idx: selected.idx };
            document.getElementById('questionText').innerHTML = currentQuestion.text;
            document.getElementById('starRating').innerHTML = "⭐".repeat(currentQuestion.stars);
            currentOptions = currentQuestion.options.map(opt => ({ display: opt, value: opt }));
            renderOptions();
            document.getElementById('feedbackMsg').innerHTML = "";
            answered = false;
        }
        
        function renderOptions() {
            const container = document.getElementById('optionsContainer');
            container.innerHTML = "";
            currentOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.display;
                btn.onclick = () => handleAnswer(opt.value);
                container.appendChild(btn);
            });
        }
        
        function handleAnswer(selectedValue) {
            if (answered || !currentQuestion) return;
            const isCorrect = (selectedValue === currentQuestion.answer);
            answered = true;
            answeredCount++;
            if (isTrial) trialAnsweredCount++;
            if (isCorrect) {
                currentScore++;
                document.getElementById('feedbackMsg').innerHTML = `✅ 正确！<br>📖 解析：${currentQuestion.explanation}`;
                if (currentMode === "wrongPractice") {
                    const idx = wrongList.findIndex(w => w.questionIdx === currentQuestion.idx);
                    if (idx !== -1) wrongList.splice(idx, 1);
                    saveWrong();
                    renderWrongList();
                }
            } else {
                document.getElementById('feedbackMsg').innerHTML = `❌ 错误！正确答案是 ${currentQuestion.answer}<br>📖 解析：${currentQuestion.explanation}`;
                if (!wrongList.some(w => w.questionIdx === currentQuestion.idx)) {
                    wrongList.push({ questionIdx: currentQuestion.idx, text: currentQuestion.text, answer: currentQuestion.answer, explanation: currentQuestion.explanation });
                    saveWrong();
                    renderWrongList();
                }
            }
            updateScoreUI();
            document.getElementById('progress').innerText = answeredCount;
            saveGameProgress();
            disableOptions();
        }
        
        function disableOptions() {
            document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
        }
        
        function enableOptions() {
            document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = false);
        }
        
        function nextQuestion() {
            if (!answered && currentQuestion) {
                // 跳过判错
                answered = true;
                answeredCount++;
                if (isTrial) trialAnsweredCount++;
                document.getElementById('feedbackMsg').innerHTML = `⏩ 跳过！正确答案是 ${currentQuestion.answer}<br>📖 解析：${currentQuestion.explanation}`;
                if (!wrongList.some(w => w.questionIdx === currentQuestion.idx)) {
                    wrongList.push({ questionIdx: currentQuestion.idx, text: currentQuestion.text, answer: currentQuestion.answer, explanation: currentQuestion.explanation });
                    saveWrong();
                    renderWrongList();
                }
                updateScoreUI();
                document.getElementById('progress').innerText = answeredCount;
                saveGameProgress();
                disableOptions();
                generateNewQuestion();
            } else {
                generateNewQuestion();
            }
        }
        
        function restartGame() {
            answeredCount = 0;
            currentScore = 0;
            wrongList = [];
            if (isTrial) trialAnsweredCount = 0;
            saveWrong();
            renderWrongList();
            updateScoreUI();
            document.getElementById('progress').innerText = answeredCount;
            generateNewQuestion();
            saveGameProgress();
        }
        
        function saveWrong() {
            localStorage.setItem(`wrongList_${currentPhone}_${currentBank}`, JSON.stringify(wrongList));
        }
        
        function renderWrongList() {
            const container = document.getElementById('wrongList');
            if (wrongList.length === 0) {
                container.innerHTML = "<div style='color:gray;'>暂无错题，答错后自动出现</div>";
                return;
            }
            container.innerHTML = "";
            wrongList.forEach(item => {
                const div = document.createElement('div');
                div.className = 'wrong-item';
                div.innerHTML = `<div><strong>${item.text.length > 40 ? item.text.substring(0, 40) + '…' : item.text}</strong><br><span style="font-size:0.75rem;">答案：${item.answer}</span></div><button class="retry-single" data-idx="${item.questionIdx}">重做</button>`;
                container.appendChild(div);
            });
            document.querySelectorAll('.retry-single').forEach(btn => {
                btn.onclick = (e) => {
                    const idx = parseInt(btn.getAttribute('data-idx'));
                    const question = currentQuestionsList[idx];
                    if (question) {
                        currentMode = "wrongPractice";
                        document.getElementById('modeInfo').innerHTML = "⚠️ 错题练习模式";
                        currentQuestion = { text: question.text, options: question.options, answer: question.answer, explanation: question.explanation, stars: question.stars, idx: idx };
                        document.getElementById('questionText').innerHTML = currentQuestion.text;
                        document.getElementById('starRating').innerHTML = "⭐".repeat(currentQuestion.stars);
                        currentOptions = currentQuestion.options.map(opt => ({ display: opt, value: opt }));
                        renderOptions();
                        document.getElementById('feedbackMsg').innerHTML = "";
                        answered = false;
                    }
                };
            });
        }
        
        function clearWrong() {
            wrongList = [];
            saveWrong();
            renderWrongList();
            if (currentMode === "wrongPractice") {
                currentMode = "normal";
                document.getElementById('modeInfo').innerHTML = "🎲 随机模式";
                generateNewQuestion();
            }
        }
        
        function practiceAllWrong() {
            if (wrongList.length === 0) {
                alert("错题本为空，请先答错一些题目");
                return;
            }
            currentMode = "wrongPractice";
            document.getElementById('modeInfo').innerHTML = "⚠️ 错题练习模式";
            generateNewQuestion();
        }
        
        function switchBank(bank) {
            if (bank === currentBank) return;
            currentBank = bank;
            currentQuestionsList = getCurrentQuestions();
            totalQuestionsCount = currentQuestionsList.length;
            document.getElementById('totalQuestions').innerText = totalQuestionsCount;
            document.getElementById('totalProgress').innerText = totalQuestionsCount;
            answeredCount = 0;
            currentScore = 0;
            wrongList = [];
            if (isTrial) trialAnsweredCount = 0;
            updateScoreUI();
            document.getElementById('progress').innerText = answeredCount;
            renderWrongList();
            generateNewQuestion();
            document.querySelectorAll('.bank-btn').forEach(btn => {
                if (btn.getAttribute('data-bank') === bank) btn.classList.add('bank-active');
                else btn.classList.remove('bank-active');
            });
            saveGameProgress();
        }
    </script>
</body>
</html>
