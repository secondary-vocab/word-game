<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>历史道法·中考冲刺800题</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #f0f2f5 0%, #e0e5ec 100%);
            font-family: 'Segoe UI', 'PingFang SC', Roboto, system-ui, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 56px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
            padding: 40px 28px;
            text-align: center;
        }
        .login-card h2 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #1e293b;
        }
        .phone-input {
            width: 100%;
            padding: 14px 18px;
            font-size: 18px;
            border: 2px solid #e2e8f0;
            border-radius: 60px;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
        }
        .login-btn {
            background: #3b82f6;
            border: none;
            padding: 14px 20px;
            width: 100%;
            border-radius: 60px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        .trial-footnote {
            margin-top: 24px;
            font-size: 13px;
            color: #5b6e8c;
        }
        .game-wrapper {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 48px;
            overflow: hidden;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.15);
        }
        .game-nav {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            padding: 18px 24px;
            color: white;
        }
        .subject-switch {
            display: flex;
            gap: 14px;
            margin-bottom: 16px;
        }
        .subject-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .subject-btn.active {
            background: white;
            color: #1e3a8a;
        }
        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .score-box, .accuracy-box {
            background: rgba(0,0,0,0.2);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
        }
        .wrongnote-btn {
            background: #f59e0b;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .progress-area {
            background: #f8fafc;
            padding: 16px 24px;
            border-bottom: 1px solid #e2e8f0;
        }
        .level-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 10px;
            color: #334155;
        }
        .progress-bar-bg {
            background: #e2e8f0;
            border-radius: 30px;
            height: 8px;
            overflow: hidden;
        }
        .progress-bar-fill {
            background: #3b82f6;
            width: 0%;
            height: 100%;
            transition: width 0.2s;
        }
        .question-area {
            padding: 24px 24px 12px;
        }
        .question-text {
            font-size: 1.35rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 24px;
            color: #0f172a;
            word-break: break-word;
        }
        .options-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .option-item {
            background: #f1f5f9;
            border: 2px solid #e2e8f0;
            border-radius: 60px;
            padding: 12px 16px;
            font-size: 0.9rem;
            text-align: left;
            cursor: pointer;
            color: #1e293b;
        }
        .option-item.correct-highlight {
            background: #bbf7d0;
            border-color: #22c55e;
        }
        .option-item.wrong-highlight {
            background: #fecaca;
            border-color: #ef4444;
        }
        .option-item.disabled-opt {
            cursor: default;
            opacity: 0.7;
        }
        .explain-area {
            background: #eef2ff;
            border-left: 5px solid #3b82f6;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin: 12px 0 8px;
            display: none;
            color: #1e293b;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            padding: 8px 24px 28px;
        }
        .redo-btn, .next-btn {
            flex: 1;
            padding: 12px;
            border-radius: 60px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        .redo-btn {
            background: #e2e8f0;
            color: #334155;
        }
        .next-btn {
            background: #3b82f6;
            color: white;
        }
    </style>
</head>
<body>
<div id="loginPanel" class="login-card">
    <h2>📚 历史·道法冲刺</h2>
    <p>输入手机号验证授权</p>
    <input type="tel" id="phoneNumber" class="phone-input" placeholder="11位手机号" maxlength="11">
    <button id="doLoginBtn" class="login-btn">验证并登录</button>
    <div class="trial-footnote">🧪 试用: 13900000000（前10题）<br>✅ 正式授权: 13971005659</div>
</div>
<div id="gameContainer" style="display: none;">
    <div class="game-wrapper">
        <div class="game-nav">
            <div class="subject-switch">
                <button class="subject-btn active" data-subject="history">📜 历史</button>
                <button class="subject-btn" data-subject="daofa">📖 道德与法治</button>
            </div>
            <div class="stats-row">
                <span class="score-box">🏆 得分: <span id="scoreValue">0</span></span>
                <span class="accuracy-box">📊 正确率: <span id="accuracyValue">0</span>%</span>
                <button class="wrongnote-btn" id="wrongNoteBtn">📋 错题本</button>
            </div>
        </div>
        <div class="progress-area">
            <div class="level-info">
                <span id="levelName">第1关 · 历史</span>
                <span id="questionProgress">0/20 题</span>
            </div>
            <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
        </div>
        <div class="question-area">
            <div class="question-text" id="questionText">加载中...</div>
            <div class="options-area" id="optionsArea"></div>
            <div class="explain-area" id="explainArea"></div>
        </div>
        <div class="action-buttons">
            <button class="redo-btn" id="redoBtn">🔄 重做本题</button>
            <button class="next-btn" id="nextBtn">下一题 ➡️</button>
        </div>
    </div>
</div>
<script>
    // 授权与全局变量
    let AUTHORIZED_PHONES = ["13971005659"];
    const TRIAL_PHONE = "13900000000";
    const TRIAL_MAX = 10;
    let currentPhone = "", isFullAuth = false, isTrial = false, trialCount = 0;
    let currentSubject = "history", currentLevel = 1, currentQuestions = [], currentIndex = 0;
    let levelScore = 0, levelAnswers = [], gameLocked = false, currentQuestionObj = null;
    let MASTER_DAOFA = [], MASTER_HISTORY = [];
    
    function initDOM() {
        window.loginPanel = document.getElementById('loginPanel');
        window.gameContainer = document.getElementById('gameContainer');
        document.getElementById('doLoginBtn').onclick = () => {
            let phone = document.getElementById('phoneNumber').value.trim();
            if (!phone || phone.length !== 11) return alert('请输入11位手机号');
            if (phone === TRIAL_PHONE) { isTrial = true; isFullAuth = false; trialCount = 0; startGame(); }
            else if (AUTHORIZED_PHONES.includes(phone)) { isFullAuth = true; isTrial = false; startGame(); }
            else alert('未授权，试用请使用13900000000');
        };
        document.getElementById('redoBtn').onclick = () => { if(gameLocked){ if(levelAnswers[currentIndex]===true) levelScore-=5; levelAnswers[currentIndex]=undefined; gameLocked=false; renderCurrent(); } else alert('请先答题'); };
        document.getElementById('nextBtn').onclick = () => { if(!gameLocked) alert('请先答题'); else if(currentIndex+1<currentQuestions.length){ currentIndex++; renderCurrent(); } else finishLevel(); };
        document.getElementById('wrongNoteBtn').onclick = () => { let wrong = []; for(let i=0;i<levelAnswers.length;i++) if(levelAnswers[i]===false && currentQuestions[i]) wrong.push(currentQuestions[i]); alert(wrong.length? '📖错题本：\n'+wrong.map((w,i)=>`${i+1}. ${w.text}\n✅${w.options[w.correct]}\n📝${w.explain}`).join('\n\n'):'无错题'); };
        document.querySelectorAll('.subject-btn').forEach(btn=>btn.onclick=()=>{ let s=btn.dataset.subject; if(s===currentSubject) return; if(isTrial && s!=='history') return alert('试用仅历史'); document.querySelectorAll('.subject-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); currentSubject=s; currentLevel=1; loadLevel(); });
    }
    function loadLevel(){
        let src = currentSubject==='history'? MASTER_HISTORY : MASTER_DAOFA;
        if(!src.length) return;
        currentQuestions = src.slice((currentLevel-1)*20, currentLevel*20);
        currentIndex=0; levelScore=0; levelAnswers=new Array(20).fill(undefined); gameLocked=false;
        renderCurrent(); updateUI();
    }
    function updateUI(){
        let answered=levelAnswers.filter(v=>v!==undefined).length, total=currentQuestions.length;
        document.getElementById('progressFill').style.width = (answered/total)*100+'%';
        document.getElementById('questionProgress').innerText = `${answered}/${total}`;
        document.getElementById('scoreValue').innerText = `${levelScore}/${total*5}`;
        let correct=levelAnswers.filter(v=>v===true).length;
        document.getElementById('accuracyValue').innerText = total? Math.round(correct/total*100):0;
        document.getElementById('levelName').innerText = `第${currentLevel}关 · ${currentSubject==='history'?'历史':'道法'}`;
    }
    function renderCurrent(){
        let q = currentQuestions[currentIndex]; currentQuestionObj=q;
        document.getElementById('questionText').innerText = q.text;
        let optsDiv = document.getElementById('optionsArea');
        optsDiv.innerHTML = '';
        q.options.forEach((opt,idx)=>{
            let btn = document.createElement('button');
            btn.innerText = `${String.fromCharCode(65+idx)}. ${opt}`;
            btn.className = 'option-item';
            btn.onclick = ()=>handleAnswer(idx);
            optsDiv.appendChild(btn);
        });
        document.getElementById('explainArea').classList.remove('show');
        gameLocked=false;
        if(levelAnswers[currentIndex]!==undefined){
            gameLocked=true;
            let btns = document.querySelectorAll('.option-item');
            btns.forEach(btn=>btn.classList.add('disabled-opt'));
            btns[q.correct]?.classList.add('correct-highlight');
            if(q.explain){ let ea=document.getElementById('explainArea'); ea.innerHTML=q.explain; ea.classList.add('show'); }
        }
        updateUI();
    }
    function handleAnswer(sel){
        if(gameLocked) return;
        let q = currentQuestionObj, correct = (sel===q.correct);
        if(isTrial && trialCount>=TRIAL_MAX){ document.getElementById('explainArea').innerHTML='🔒试用结束，请购买完整版'; document.getElementById('explainArea').classList.add('show'); gameLocked=true; return; }
        levelAnswers[currentIndex]=correct;
        if(correct) levelScore+=5;
        if(isTrial) trialCount++;
        let btns = document.querySelectorAll('.option-item');
        btns.forEach((btn,i)=>{ btn.classList.add('disabled-opt'); if(i===q.correct) btn.classList.add('correct-highlight'); if(i===sel && i!==q.correct) btn.classList.add('wrong-highlight'); });
        let expDiv = document.getElementById('explainArea');
        expDiv.innerHTML = q.explain || (correct?'✅正确！':`❌错误，正确答案：${q.options[q.correct]}`);
        expDiv.classList.add('show');
        gameLocked=true;
        updateUI();
        if(isTrial && trialCount===TRIAL_MAX) setTimeout(()=>alert('试用结束，已完成10题'),200);
    }
    function finishLevel(){
        let total=currentQuestions.length, correct=levelAnswers.filter(v=>v===true).length, rate=correct/total;
        if(rate>=0.8){
            if(currentLevel<20){ alert(`🎉过关！${Math.round(rate*100)}%，进入${currentLevel+1}关`); currentLevel++; loadLevel(); }
            else alert(`🏆通关！完成${currentSubject==='history'?'历史':'道法'}全部20关！得分${levelScore}/${total*5}`);
        } else alert(`❌未过关，正确率${Math.round(rate*100)}%（需≥80%），重来`);
    }
    function startGame(){ document.getElementById('loginPanel').style.display='none'; document.getElementById('gameContainer').style.display='block'; loadLevel(); }
    window.initGame = function(){ initDOM(); if(MASTER_HISTORY.length===400 && MASTER_DAOFA.length===400) console.log('题库800题就绪'); };
</script><script>
